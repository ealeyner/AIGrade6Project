  function drawBackground() {
    if (!bgCache || bgCacheLevel !== level) buildBackgroundCache();
    ctx.drawImage(bgCache, 0, 0);

    // Animated camp smoke / magical glow trail
    const fx = bgCache.fireX, fy = bgCache.fireY;
    const t = Date.now() / 800;
    for (let i = 0; i < 5; i++) {
      const phase = (t + i * 0.3) % 1;
      const sx = fx + Math.sin(phase * 6 + i) * 6;
      const sy = fy - 8 - phase * 60;
      const r = 3 + phase * 8;
      ctx.fillStyle = level === 5
        ? `rgba(255, 230, 130, ${0.55 * (1 - phase)})`
        : level === 4
          ? `rgba(200, 130, 255, ${0.45 * (1 - phase)})`
          : `rgba(180, 180, 180, ${0.35 * (1 - phase)})`;
      ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI*2); ctx.fill();
    }
    const flick = 0.6 + 0.4 * Math.sin(Date.now() / 90);
    ctx.fillStyle = level === 5
      ? `rgba(255, 250, 200, ${0.85 * flick})`
      : level === 4
        ? `rgba(220, 150, 255, ${0.7 * flick})`
        : `rgba(255, 235, 59, ${0.55 * flick})`;
    ctx.beginPath(); ctx.arc(fx, fy - 5, 3 * flick, 0, Math.PI*2); ctx.fill();

    // Falling snowflakes (level 2 only)
    if (level === 2) {
      const snowT = Date.now() / 100;
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      for (let i = 0; i < 50; i++) {
        const sx = ((i * 91 + snowT * (0.3 + (i % 4) * 0.2)) % WORLD_W);
        const baseY = (i * 247 + snowT * 2.5) % WORLD_H;
        ctx.beginPath(); ctx.arc(sx, baseY, 1.4 + (i % 3) * 0.4, 0, Math.PI*2); ctx.fill();
      }
    }

    // Floating embers (level 3 only) — drift UP from below
    if (level === 3) {
      const emberT = Date.now() / 80;
      for (let i = 0; i < 55; i++) {
        const wobble = Math.sin(emberT * 0.05 + i) * 8;
        const ex = ((i * 67 + 30) % WORLD_W) + wobble;
        // Embers drift upward (subtract instead of add)
        const ey = WORLD_H - ((i * 251 + emberT * 3) % WORLD_H);
        const flicker = 0.5 + 0.5 * Math.sin(emberT * 0.2 + i);
        const r = 1.3 + (i % 3) * 0.4;
        // Outer glow
        ctx.fillStyle = `rgba(255, 100, 30, ${0.25 * flicker})`;
        ctx.beginPath(); ctx.arc(ex, ey, r * 2.5, 0, Math.PI*2); ctx.fill();
        // Core
        ctx.fillStyle = `rgba(255, ${180 + 60 * flicker}, ${30 + 40 * flicker}, ${0.75 * flicker})`;
        ctx.beginPath(); ctx.arc(ex, ey, r, 0, Math.PI*2); ctx.fill();
      }
    }

    // Divine golden sparks (level 5 only) — drift upward like rising motes
    if (level === 5) {
      const sparkT = Date.now() / 70;
      for (let i = 0; i < 70; i++) {
        const wobble = Math.sin(sparkT * 0.04 + i) * 10;
        const sx = ((i * 67 + 30) % WORLD_W) + wobble;
        const sy = WORLD_H - ((i * 251 + sparkT * 2) % WORLD_H);
        const flicker = 0.55 + 0.45 * Math.sin(sparkT * 0.18 + i);
        const r = 1.4 + (i % 3) * 0.5;
        // Outer halo
        ctx.fillStyle = `rgba(255, 220, 80, ${0.35 * flicker})`;
        ctx.beginPath(); ctx.arc(sx, sy, r * 2.5, 0, Math.PI*2); ctx.fill();
        // Bright golden core
        ctx.fillStyle = `rgba(255, ${230 + 20 * flicker}, ${100 + 50 * flicker}, ${0.95 * flicker})`;
        ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI*2); ctx.fill();
      }
    }

    // Floating magical spores (level 4 only) — drift gently sideways with wobble
    if (level === 4) {
      const sporeT = Date.now() / 90;
      for (let i = 0; i < 55; i++) {
        const wobble = Math.sin(sporeT * 0.03 + i) * 12;
        const sx = ((i * 67 + 30 + sporeT * 0.4) % WORLD_W) + wobble;
        const sy = (i * 251 + sporeT * 1.2) % WORLD_H;
        const flicker = 0.55 + 0.45 * Math.sin(sporeT * 0.15 + i);
        const r = 1.2 + (i % 3) * 0.4;
        // Outer aura
        ctx.fillStyle = `rgba(180, 100, 255, ${0.28 * flicker})`;
        ctx.beginPath(); ctx.arc(sx, sy, r * 2.6, 0, Math.PI*2); ctx.fill();
        // Bright core
        ctx.fillStyle = `rgba(${220 + 35 * flicker}, ${180 + 50 * flicker}, 255, ${0.85 * flicker})`;
        ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI*2); ctx.fill();
      }
    }
  }

  function drawPickup(p) {
    if (p.taken) return;
    const bob = Math.sin((Date.now() + p.x * 7) / 250) * 3;
    ctx.save();
    ctx.translate(p.x, p.y + bob);
    ctx.rotate(-0.4);
    ctx.fillStyle = '#ffeb3b';
    ctx.beginPath(); ctx.ellipse(0, 0, 11, 5, 0, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#bfa800'; ctx.lineWidth = 1.2; ctx.stroke();
    ctx.fillStyle = '#5b3a1e';
    ctx.fillRect(-11, -1.5, 3, 3);
    ctx.restore();
  }

  function drawGoal(g) {
    if (g.taken) return;
    const bob = Math.sin(g.t) * 4;
    const glow = 0.5 + 0.5 * Math.sin(g.t * 1.5);
    ctx.save();
    ctx.translate(g.x + g.w/2, g.y + g.h/2 + bob);
    // Glow
    ctx.fillStyle = `rgba(255, 215, 0, ${0.15 + 0.2*glow})`;
    ctx.beginPath(); ctx.arc(0, 0, 40 + 6*glow, 0, Math.PI*2); ctx.fill();
    // Golden banana
    ctx.rotate(-0.5 + Math.sin(g.t*0.6)*0.1);
    const grd = ctx.createLinearGradient(-20, -10, 20, 10);
    grd.addColorStop(0, '#fff59d');
    grd.addColorStop(0.5, '#ffd700');
    grd.addColorStop(1, '#bf9000');
    ctx.fillStyle = grd;
    ctx.beginPath(); ctx.ellipse(0, 0, 22, 8, 0, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#7a5d00'; ctx.lineWidth = 1.5; ctx.stroke();
    ctx.fillStyle = '#5b3a1e';
    ctx.fillRect(-22, -2, 5, 4);
    ctx.restore();
    // Label
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.font = 'bold 14px Trebuchet MS';
    ctx.textAlign = 'center';
    ctx.fillText('GOLDEN BANANA', g.x + g.w/2, g.y - 18);
    ctx.fillStyle = '#fff59d';
    ctx.fillText('GOLDEN BANANA', g.x + g.w/2, g.y - 19);
  }

  function drawPlatforms() {
    const t = Date.now() / 600;
    for (const p of platforms) {
      if (p.y >= GROUND_Y) continue;

      // Drop shadow under
      ctx.fillStyle = 'rgba(0,0,0,0.22)';
      ctx.fillRect(p.x + 3, p.y + p.h + 1, p.w, 4);

      // Bark base — gradient
      const wg = ctx.createLinearGradient(0, p.y, 0, p.y + p.h);
      wg.addColorStop(0, '#8b5a2b');
      wg.addColorStop(0.5, '#6d4423');
      wg.addColorStop(1, '#3a2410');
      ctx.fillStyle = wg;
      ctx.fillRect(p.x, p.y, p.w, p.h);

      // Wood grain streaks
      ctx.strokeStyle = 'rgba(0,0,0,0.28)';
      ctx.lineWidth = 0.7;
      for (let i = 4; i < p.w; i += 13) {
        ctx.beginPath();
        ctx.moveTo(p.x + i, p.y + 1);
        ctx.lineTo(p.x + i + 2, p.y + p.h - 1);
        ctx.stroke();
      }
      // Knot
      const seed = Math.floor(p.x * 13 + p.y) % 100;
      if (seed < 60) {
        const kx = p.x + 8 + (seed * 5) % Math.max(p.w - 16, 1);
        ctx.fillStyle = '#3a2410';
        ctx.beginPath(); ctx.arc(kx, p.y + p.h/2, 2, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth = 0.6;
        ctx.beginPath(); ctx.arc(kx, p.y + p.h/2, 3, 0, Math.PI*2); ctx.stroke();
      }
      // Bark outline
      ctx.strokeStyle = 'rgba(0,0,0,0.35)'; ctx.lineWidth = 1;
      ctx.strokeRect(p.x, p.y, p.w, p.h);

      // Mossy top
      const mg = ctx.createLinearGradient(0, p.y - 5, 0, p.y + 2);
      mg.addColorStop(0, '#9ccc65');
      mg.addColorStop(0.5, '#558b2f');
      mg.addColorStop(1, '#2e7d32');
      ctx.fillStyle = mg;
      ctx.fillRect(p.x, p.y - 4, p.w, 6);

      // Grass blades on top
      ctx.strokeStyle = '#1b5e20'; ctx.lineWidth = 1;
      for (let i = 2; i < p.w; i += 5) {
        const h = 3 + ((i * 11) % 4);
        const lean = ((i * 7) % 3) - 1;
        ctx.beginPath();
        ctx.moveTo(p.x + i, p.y - 3);
        ctx.lineTo(p.x + i + lean, p.y - 3 - h);
        ctx.stroke();
      }
      // Lighter grass tips
      ctx.strokeStyle = '#aed581'; ctx.lineWidth = 0.8;
      for (let i = 4; i < p.w; i += 5) {
        ctx.beginPath();
        ctx.moveTo(p.x + i, p.y - 4);
        ctx.lineTo(p.x + i, p.y - 6);
        ctx.stroke();
      }
      // Occasional flower on top
      if (seed % 4 === 1) {
        const fx = p.x + 12 + (seed * 9) % Math.max(p.w - 24, 1);
        const colors = ['#ff6f00', '#e91e63', '#ffeb3b', '#ab47bc'];
        ctx.fillStyle = colors[seed % 4];
        for (let a = 0; a < Math.PI * 2; a += Math.PI / 2) {
          ctx.beginPath();
          ctx.arc(fx + Math.cos(a) * 2, p.y - 8 + Math.sin(a) * 2, 1.6, 0, Math.PI*2);
          ctx.fill();
        }
        ctx.fillStyle = '#fff59d';
        ctx.beginPath(); ctx.arc(fx, p.y - 8, 1.2, 0, Math.PI*2); ctx.fill();
      }

      // Hanging vines with sway + leaves
      ctx.strokeStyle = '#33691e'; ctx.lineWidth = 2;
      for (let i = 12; i < p.w; i += 26) {
        const vh = 16 + ((i * 17) % 12);
        const sway = Math.sin(t + i * 0.3 + p.x * 0.01) * 3;
        const bx = p.x + i, by = p.y + p.h;
        ctx.beginPath();
        ctx.moveTo(bx, by);
        ctx.quadraticCurveTo(bx + sway, by + vh / 2, bx + sway * 1.5, by + vh);
        ctx.stroke();
        // Leaf at the end
        ctx.fillStyle = '#558b2f';
        ctx.save();
        ctx.translate(bx + sway * 1.5, by + vh + 2);
        ctx.rotate(sway * 0.15);
        ctx.beginPath(); ctx.ellipse(0, 0, 4, 2, 0.5, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#1b5e20'; ctx.lineWidth = 0.5;
        ctx.beginPath(); ctx.moveTo(-3, 0); ctx.lineTo(3, 0); ctx.stroke();
        ctx.restore();
      }
    }
  }

  function drawTree(t) {
    if (!t.alive) {
      // Stump with growth rings
      ctx.fillStyle = '#3e2410';
      ctx.fillRect(t.x - 2, t.y - 16, t.w + 4, 16);
      ctx.fillStyle = '#a17350';
      ctx.fillRect(t.x, t.y - 16, t.w, 4);
      // Rings
      ctx.strokeStyle = '#6d4423'; ctx.lineWidth = 0.7;
      const rcx = t.x + t.w/2;
      for (let r = 2; r < t.w/2 + 1; r += 2) {
        ctx.beginPath();
        ctx.ellipse(rcx, t.y - 14, r, 1.2, 0, 0, Math.PI*2);
        ctx.stroke();
      }
      // Axe embedded in the stump
      ctx.save();
      ctx.translate(rcx, t.y - 14);
      ctx.rotate(-0.7);
      // Handle
      ctx.fillStyle = '#6d4c2a';
      ctx.fillRect(0, -1.5, 20, 3);
      ctx.strokeStyle = '#3e2723'; ctx.lineWidth = 0.6;
      ctx.strokeRect(0, -1.5, 20, 3);
      // Head
      const ahg = ctx.createLinearGradient(-2, -7, 4, 7);
      ahg.addColorStop(0, '#eceff1');
      ahg.addColorStop(1, '#546e7a');
      ctx.fillStyle = ahg;
      ctx.beginPath();
      ctx.moveTo(-1, -7); ctx.lineTo(5, -3); ctx.lineTo(5, 3); ctx.lineTo(-1, 7);
      ctx.lineTo(-3, 3); ctx.lineTo(-3, -3); ctx.closePath(); ctx.fill();
      ctx.strokeStyle = '#263238'; ctx.lineWidth = 0.7; ctx.stroke();
      ctx.restore();
      // Wood chips scattered
      ctx.fillStyle = '#a17350';
      for (let i = 0; i < 5; i++) {
        const cx = t.x - 6 + ((i * 13) % (t.w + 12));
        const cy = t.y - 1 - ((i * 5) % 3);
        ctx.fillRect(cx, cy, 2, 1.5);
      }
      return;
    }
    const sway = Math.sin(t.sway) * 2;
    // Trunk
    ctx.fillStyle = '#5b3a1e';
    ctx.fillRect(t.x, t.y - t.h, t.w, t.h);
    // Leaves
    ctx.fillStyle = '#2e7d32';
    ctx.beginPath();
    ctx.arc(t.x + t.w/2 + sway, t.y - t.h - 10, 36, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#388e3c';
    ctx.beginPath();
    ctx.arc(t.x + t.w/2 - 18 + sway, t.y - t.h, 26, 0, Math.PI*2); ctx.fill();
    ctx.beginPath();
    ctx.arc(t.x + t.w/2 + 20 + sway, t.y - t.h, 26, 0, Math.PI*2); ctx.fill();

    // HP bar
    if (t.hp < 200) {
      ctx.fillStyle = 'rgba(0,0,0,0.4)';
      ctx.fillRect(t.x - 8, t.y - t.h - 60, 44, 6);
      ctx.fillStyle = t.hp > 80 ? '#8bc34a' : '#e53935';
      ctx.fillRect(t.x - 7, t.y - t.h - 59, 42 * (t.hp/200), 4);
    }
  }

  function drawMonkey(p) {
    ctx.save();
    if (p.invuln > 0 && Math.floor(p.invuln/4) % 2 === 0) ctx.globalAlpha = 0.45;
    const cx = p.x + p.w/2, cy = p.y + p.h/2;

    // Soft shadow on ground
    if (p.onGround) {
      ctx.fillStyle = 'rgba(0,0,0,0.28)';
      ctx.beginPath(); ctx.ellipse(cx, p.y + p.h + 2, 17, 4, 0, 0, Math.PI*2); ctx.fill();
    }

    // GOD-FORM lightning crackles (no halo — just energy bolts radiating outward)
    if (godForm) {
      const gt = Date.now() / 200;
      ctx.strokeStyle = 'rgba(255, 250, 220, 0.8)';
      ctx.lineWidth = 1.6;
      const bolts = 5;
      for (let i = 0; i < bolts; i++) {
        const a = (gt * 0.4 + i * Math.PI*2 / bolts) % (Math.PI*2);
        const r0 = 22, r1 = 38 + Math.sin(gt*3 + i) * 4;
        const mid = (r0 + r1) / 2;
        const wob = Math.sin(gt*5 + i*1.3) * 4;
        const x0 = cx + Math.cos(a) * r0, y0 = cy + 2 + Math.sin(a) * r0;
        const xm = cx + Math.cos(a) * mid + Math.cos(a + Math.PI/2) * wob;
        const ym = cy + 2 + Math.sin(a) * mid + Math.sin(a + Math.PI/2) * wob;
        const x1 = cx + Math.cos(a) * r1, y1 = cy + 2 + Math.sin(a) * r1;
        ctx.beginPath();
        ctx.moveTo(x0, y0); ctx.lineTo(xm, ym); ctx.lineTo(x1, y1);
        ctx.stroke();
      }
    }
    // Blink afterimage flash — bright purple aftereffect right after teleport
    if (p.blinkFlash > 0) {
      const flashA = p.blinkFlash / 14;
      const flash = ctx.createRadialGradient(cx, cy, 4, cx, cy, 30 + 20 * (1 - flashA));
      flash.addColorStop(0, `rgba(255, 230, 255, ${0.7 * flashA})`);
      flash.addColorStop(0.6, `rgba(190, 130, 255, ${0.45 * flashA})`);
      flash.addColorStop(1, 'rgba(150, 80, 230, 0)');
      ctx.fillStyle = flash;
      ctx.beginPath(); ctx.arc(cx, cy, 30 + 20 * (1 - flashA), 0, Math.PI*2); ctx.fill();
    }

    ctx.translate(cx, cy);
    if (p.facing < 0) ctx.scale(-1, 1);

    const wobble = Math.sin(p.anim) * 2;
    const airborne = !p.onGround;

    // Tail — curly with shading
    ctx.strokeStyle = '#3d2515'; ctx.lineWidth = 7; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(-12, 8);
    ctx.bezierCurveTo(-26, 6 + wobble, -28, -10 + wobble, -14, -18 + wobble);
    ctx.stroke();
    ctx.strokeStyle = '#8b5a2b'; ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(-12, 8);
    ctx.bezierCurveTo(-24, 6 + wobble, -26, -10 + wobble, -14, -17 + wobble);
    ctx.stroke();
    // Tail tip curl
    ctx.fillStyle = '#e8c694';
    ctx.beginPath(); ctx.arc(-14, -18 + wobble, 2.5, 0, Math.PI*2); ctx.fill();

    // Body — rounded with gradient (brighter on dark levels for natural contrast)
    const darkLvl = level === 3 || level === 4;
    const bgrad = ctx.createRadialGradient(-3, 0, 3, 0, 6, 18);
    bgrad.addColorStop(0, darkLvl ? '#d9974e' : '#9c6536');
    bgrad.addColorStop(1, darkLvl ? '#8e5728' : '#5d3a1c');
    ctx.fillStyle = bgrad;
    ctx.beginPath(); ctx.ellipse(0, 6, 15, 13, 0, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#3d2515'; ctx.lineWidth = 1;
    ctx.stroke();

    // Belly (brighter cream on dark levels)
    ctx.fillStyle = darkLvl ? '#fbe4c0' : '#e8c694';
    ctx.beginPath(); ctx.ellipse(0, 8, 9, 9, 0, 0, Math.PI*2); ctx.fill();
    // Banana-yellow chest tuft accent
    ctx.fillStyle = '#fff59d';
    ctx.beginPath(); ctx.arc(0, 2, 2, 0, Math.PI*2); ctx.fill();

    // Gliding pose — large wing membranes + spread arms + flying-squirrel pose
    if (p.gliding) {
      const bobG = Math.sin(Date.now() / 180) * 1.2;
      ctx.save();
      ctx.translate(0, bobG);

      // Large wing membrane gradient (flying-squirrel patagium)
      const wingG = ctx.createLinearGradient(0, -2, 0, 26);
      wingG.addColorStop(0,   'rgba(245, 255, 255, 0.9)');
      wingG.addColorStop(0.4, 'rgba(215, 235, 250, 0.78)');
      wingG.addColorStop(1,   'rgba(140, 185, 220, 0.45)');

      // Left wing — extends from arm/shoulder down to hip
      ctx.fillStyle = wingG;
      ctx.beginPath();
      ctx.moveTo(-14, 2);
      ctx.quadraticCurveTo(-32, 6, -34, 22);
      ctx.lineTo(-26, 24);
      ctx.quadraticCurveTo(-16, 20, -4, 16);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = 'rgba(60, 120, 170, 0.85)'; ctx.lineWidth = 1.4;
      ctx.stroke();
      // Wing veins
      ctx.strokeStyle = 'rgba(100, 150, 200, 0.55)'; ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(-14, 2); ctx.lineTo(-28, 22);
      ctx.moveTo(-14, 2); ctx.lineTo(-20, 22);
      ctx.moveTo(-14, 2); ctx.lineTo(-12, 18);
      ctx.stroke();

      // Right wing — mirrored
      ctx.fillStyle = wingG;
      ctx.beginPath();
      ctx.moveTo(14, 2);
      ctx.quadraticCurveTo(32, 6, 34, 22);
      ctx.lineTo(26, 24);
      ctx.quadraticCurveTo(16, 20, 4, 16);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = 'rgba(60, 120, 170, 0.85)'; ctx.lineWidth = 1.4;
      ctx.stroke();
      ctx.strokeStyle = 'rgba(100, 150, 200, 0.55)'; ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(14, 2); ctx.lineTo(28, 22);
      ctx.moveTo(14, 2); ctx.lineTo(20, 22);
      ctx.moveTo(14, 2); ctx.lineTo(12, 18);
      ctx.stroke();

      // Wind streak lines flanking the monkey
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.7)'; ctx.lineWidth = 1.3;
      const wt = Date.now() / 80;
      for (let i = 0; i < 5; i++) {
        const offset = ((wt + i * 7) % 26) - 13;
        ctx.beginPath();
        ctx.moveTo(-40 - i*4, offset);
        ctx.lineTo(-30 - i*4, offset);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(30 + i*4, offset + 5);
        ctx.lineTo(40 + i*4, offset + 5);
        ctx.stroke();
      }

      ctx.restore();
    }

    // Arms with hands
    if (p.gliding) {
      // Stretched horizontally outward like flying-squirrel
      ctx.fillStyle = '#7a4a22';
      ctx.beginPath(); ctx.ellipse(-18, 7, 11, 4, 0.18, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#3d2515'; ctx.lineWidth = 0.8; ctx.stroke();
      ctx.fillStyle = '#8b5a2b';
      ctx.beginPath(); ctx.ellipse(18, 7, 11, 4, -0.18, 0, Math.PI*2); ctx.fill();
      ctx.stroke();
      // Hands at outer tips
      ctx.fillStyle = '#e8c694';
      ctx.beginPath(); ctx.arc(-28, 8, 3.2, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#3d2515'; ctx.lineWidth = 0.6; ctx.stroke();
      ctx.beginPath(); ctx.arc(28, 8, 3.2, 0, Math.PI*2); ctx.fill();
      ctx.stroke();
    } else {
      const armSwing = airborne ? -4 : Math.sin(p.anim) * 4;
      // Back arm
      ctx.fillStyle = '#7a4a22';
      ctx.beginPath(); ctx.ellipse(-13, 4 + armSwing, 4, 8, -0.25, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#3d2515'; ctx.lineWidth = 0.8; ctx.stroke();
      ctx.fillStyle = '#e8c694';
      ctx.beginPath(); ctx.arc(-13, 11 + armSwing, 3, 0, Math.PI*2); ctx.fill();
      // Front arm
      ctx.fillStyle = '#8b5a2b';
      ctx.beginPath(); ctx.ellipse(13, 4 - armSwing, 4, 8, 0.25, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#3d2515'; ctx.stroke();
      ctx.fillStyle = '#e8c694';
      ctx.beginPath(); ctx.arc(13, 11 - armSwing, 3, 0, Math.PI*2); ctx.fill();
    }

    // Legs
    ctx.fillStyle = '#7a4a22';
    if (airborne) {
      ctx.beginPath(); ctx.ellipse(-5, 17, 4, 6, 0.45, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(5, 17, 4, 6, -0.45, 0, Math.PI*2); ctx.fill();
    } else {
      const legSwing = Math.sin(p.anim + Math.PI) * 2;
      ctx.beginPath(); ctx.ellipse(-5, 19 + legSwing*0.4, 4, 7, 0, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(5, 19 - legSwing*0.4, 4, 7, 0, 0, Math.PI*2); ctx.fill();
    }
    // Feet
    ctx.fillStyle = '#e8c694';
    ctx.beginPath(); ctx.ellipse(-5, 24, 4, 2, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(5, 24, 4, 2, 0, 0, Math.PI*2); ctx.fill();

    // Head — with radial highlight (brighter on dark levels)
    const hgrad = ctx.createRadialGradient(-3, -17, 3, 0, -14, 15);
    hgrad.addColorStop(0, darkLvl ? '#e08b5e' : '#a87045');
    hgrad.addColorStop(1, darkLvl ? '#8e5728' : '#5d3a1c');
    ctx.fillStyle = hgrad;
    ctx.beginPath(); ctx.arc(0, -14, 14, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#3d2515'; ctx.lineWidth = 1;
    ctx.stroke();

    // Ears with inner pink
    ctx.fillStyle = '#7a4a22';
    ctx.beginPath(); ctx.arc(-12, -19, 5.5, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#3d2515'; ctx.lineWidth = 0.8; ctx.stroke();
    ctx.beginPath(); ctx.arc(12, -19, 5.5, 0, Math.PI*2); ctx.fill();
    ctx.stroke();
    ctx.fillStyle = '#f4b97a';
    ctx.beginPath(); ctx.arc(-12, -19, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(12, -19, 3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#e57373';
    ctx.beginPath(); ctx.arc(-12, -18, 1.4, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(12, -18, 1.4, 0, Math.PI*2); ctx.fill();

    // Face mask (lighter)
    ctx.fillStyle = '#e8c694';
    ctx.beginPath(); ctx.ellipse(2, -10, 10, 9, 0, 0, Math.PI*2); ctx.fill();
    // Tuft of hair on top (skipped on god-form — crown replaces it)
    if (!godForm) {
      ctx.strokeStyle = '#3d2515'; ctx.lineWidth = 2; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(-4, -27); ctx.quadraticCurveTo(-2, -31, 1, -27); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(1, -27); ctx.quadraticCurveTo(3, -30, 5, -27); ctx.stroke();
    }

    // Cheek blush
    ctx.fillStyle = 'rgba(231, 130, 130, 0.45)';
    ctx.beginPath(); ctx.arc(-3, -7, 2.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(7, -7, 2.5, 0, Math.PI*2); ctx.fill();

    // Eyes — whites + pupils + glint (or DIVINE GLOWING GOLD on god-form)
    if (godForm) {
      // Radiant golden eyes — powerful, not demonic
      for (const ex of [-2, 5]) {
        const eyeGlow = ctx.createRadialGradient(ex, -13, 0, ex, -13, 5);
        eyeGlow.addColorStop(0, 'rgba(255, 240, 160, 0.95)');
        eyeGlow.addColorStop(1, 'rgba(255, 200, 80, 0)');
        ctx.fillStyle = eyeGlow;
        ctx.beginPath(); ctx.arc(ex, -13, 5, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#fff8d0';
        ctx.beginPath(); ctx.ellipse(ex, -13, 3.2, 2.4, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#ffd54f';
        ctx.beginPath(); ctx.arc(ex + 1, -13, 1.4, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(ex + 1.3, -13.3, 0.5, 0, Math.PI*2); ctx.fill();
      }
      // Calm, focused eyebrows (slight downward, not angry)
      ctx.strokeStyle = '#3d2515'; ctx.lineWidth = 1.6; ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(-6, -17); ctx.lineTo(1, -16);
      ctx.moveTo(2, -16); ctx.lineTo(9, -17);
      ctx.stroke();
    } else {
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(-2, -13, 2.8, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(5, -13, 2.8, 0, Math.PI*2); ctx.fill();
      const lookOffset = airborne ? 0.7 : 0.4;
      ctx.fillStyle = '#1a0f0f';
      ctx.beginPath(); ctx.arc(-2 + lookOffset, -13, 1.6, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(5 + lookOffset, -13, 1.6, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(-1.5 + lookOffset, -13.5, 0.6, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(5.5 + lookOffset, -13.5, 0.6, 0, Math.PI*2); ctx.fill();
    }

    // Nostrils
    ctx.fillStyle = '#3d2515';
    ctx.beginPath(); ctx.arc(1, -9, 1, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(4, -9, 1, 0, Math.PI*2); ctx.fill();

    // Mouth — friendly smile or stoic determined closed-mouth
    if (godForm) {
      // Calm, determined expression — straight line slightly upturned at the ends
      ctx.strokeStyle = '#3d2515'; ctx.lineWidth = 1.6; ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(-2, -6);
      ctx.quadraticCurveTo(2, -7, 6, -6);
      ctx.stroke();
    } else {
      ctx.strokeStyle = '#3d2515'; ctx.lineWidth = 1.4; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.arc(2, -7, 3, 0.2, Math.PI - 0.2); ctx.stroke();
      ctx.fillStyle = '#fff';
      ctx.fillRect(1, -5, 1.4, 1.4);
    }

    // GOD-FORM crown above the head
    if (godForm) {
      // Crown base band
      ctx.fillStyle = '#d4af37';
      ctx.fillRect(-9, -32, 18, 4);
      ctx.strokeStyle = '#7a5a00'; ctx.lineWidth = 0.6;
      ctx.strokeRect(-9, -32, 18, 4);
      // Crown spikes
      for (let i = 0; i < 5; i++) {
        const sx = -8 + i * 4;
        ctx.beginPath();
        ctx.moveTo(sx, -32);
        ctx.lineTo(sx + 2, -38);
        ctx.lineTo(sx + 4, -32);
        ctx.closePath();
        ctx.fillStyle = '#d4af37'; ctx.fill();
        ctx.stroke();
      }
      // Crown gem
      ctx.fillStyle = '#ff1744';
      ctx.beginPath(); ctx.arc(0, -30, 1.6, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(-0.5, -30.5, 0.4, 0, Math.PI*2); ctx.fill();
      // Floating divine halo ring above
      const ht = Date.now() / 300;
      const halpha = 0.65 + 0.25 * Math.sin(ht);
      ctx.strokeStyle = `rgba(255, 240, 130, ${halpha})`;
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.ellipse(0, -42, 11, 3, 0, 0, Math.PI*2);
      ctx.stroke();
      ctx.strokeStyle = `rgba(255, 255, 220, ${halpha * 0.7})`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.ellipse(0, -42, 11, 3, 0, 0, Math.PI*2);
      ctx.stroke();
    }

    ctx.restore();
  }

  function drawLogger(l) {
    if (!l.alive) return;
    ctx.save();
    const cx = l.x + l.w/2, cy = l.y + l.h/2;
    ctx.translate(cx, cy);
    if (l.facing < 0) ctx.scale(-1, 1);

    const walk = Math.sin(l.anim) * 3;
    // Legs
    ctx.fillStyle = '#3e2723';
    ctx.fillRect(-9, 14, 7, 14 + walk*0.3);
    ctx.fillRect(2,  14, 7, 14 - walk*0.3);
    // Body (red plaid shirt)
    ctx.fillStyle = '#b71c1c';
    ctx.fillRect(-12, -6, 24, 22);
    ctx.strokeStyle = '#000'; ctx.lineWidth = 1;
    for (let i = -10; i < 12; i += 6) { ctx.beginPath(); ctx.moveTo(i, -6); ctx.lineTo(i, 16); ctx.stroke(); }
    for (let j = -4; j < 16; j += 6) { ctx.beginPath(); ctx.moveTo(-12, j); ctx.lineTo(12, j); ctx.stroke(); }
    // Head
    ctx.fillStyle = '#f5d6b3';
    ctx.beginPath(); ctx.arc(0, -16, 10, 0, Math.PI*2); ctx.fill();
    // Beard
    ctx.fillStyle = '#5d4037';
    ctx.beginPath(); ctx.arc(0, -11, 8, 0, Math.PI); ctx.fill();
    // Hat
    ctx.fillStyle = '#fbc02d';
    ctx.fillRect(-10, -26, 20, 6);
    ctx.fillRect(-12, -22, 24, 3);
    // Eyes
    ctx.fillStyle = '#000';
    ctx.fillRect(-3, -18, 2, 2);
    ctx.fillRect(3, -18, 2, 2);

    // Axe
    const chopping = l.chopT > 0 && l.vx === 0;
    const axeAngle = chopping ? Math.sin(l.chopT * 0.3) * 0.8 - 0.4 : -0.2;
    ctx.save();
    ctx.translate(10, 0);
    ctx.rotate(axeAngle);
    ctx.fillStyle = '#6d4c2a';
    ctx.fillRect(0, -2, 22, 4);
    ctx.fillStyle = '#bdbdbd';
    ctx.beginPath();
    ctx.moveTo(20, -10); ctx.lineTo(30, -6); ctx.lineTo(30, 6); ctx.lineTo(20, 10);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#555'; ctx.stroke();
    ctx.restore();

    // Stun stars
    if (l.stun > 0) {
      ctx.fillStyle = '#ffeb3b';
      const t = Date.now() / 100;
      for (let i = 0; i < 3; i++) {
        const a = t + i * 2.1;
        ctx.beginPath();
        ctx.arc(Math.cos(a)*12, -28 + Math.sin(a)*4, 3, 0, Math.PI*2);
        ctx.fill();
      }
    }
    ctx.restore();
  }

  // Golden halo drawn under any enemy with `divine: true` (L5 buffed enemies)
  function drawDivineHalo(w) {
    if (!w.divine || !w.alive) return;
    const cx = w.x + w.w/2, cy = w.y + w.h/2;
    const r = (Math.max(w.w, w.h) * (w.boss ? 1.3 : 1.1)) + 12;
    const t = Date.now() / 240;
    // Pulse ring
    ctx.strokeStyle = `rgba(255, 230, 130, ${0.55 + 0.25 * Math.sin(t)})`;
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(cx, cy, r * 0.85, 0, Math.PI*2); ctx.stroke();
    // Soft radial glow
    const halo = ctx.createRadialGradient(cx, cy, 4, cx, cy, r);
    halo.addColorStop(0, 'rgba(255, 240, 170, 0.55)');
    halo.addColorStop(0.5, 'rgba(255, 210, 100, 0.28)');
    halo.addColorStop(1, 'rgba(255, 180, 60, 0)');
    ctx.fillStyle = halo;
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
    // Tiny floating sparkles around the enemy
    for (let i = 0; i < 4; i++) {
      const a = t * 0.8 + i * Math.PI / 2;
      const sx = cx + Math.cos(a) * (r * 0.7);
      const sy = cy + Math.sin(a) * (r * 0.7);
      ctx.fillStyle = 'rgba(255, 240, 160, 0.85)';
      ctx.beginPath(); ctx.arc(sx, sy, 1.4, 0, Math.PI*2); ctx.fill();
    }
  }

  function drawHawk(w) {
    drawDivineHalo(w);
    if (!w.alive) return;
    const cx = w.x + w.w/2, cy = w.y + w.h/2;
    const swooping = w.swoopT > 0;

    // Boss aura
    if (w.boss) {
      const a = Date.now() / 220;
      for (let i = 0; i < 3; i++) {
        const phase = ((a + i * 0.45) % 1);
        const r = 40 + phase * 24;
        const op = 0.32 * (1 - phase);
        ctx.strokeStyle = `rgba(255, 215, 120, ${op})`;
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.stroke();
      }
    }

    ctx.save();
    ctx.translate(cx, cy);
    const scale = w.boss ? 1.4 : 1;
    ctx.scale(scale, scale);
    // Face direction of movement
    const dir = (swooping ? Math.sign((player.x + player.w/2) - cx) : Math.sign(Math.cos(w.t))) || 1;
    ctx.scale(dir, 1);
    // Body tilt when swooping
    if (swooping) ctx.rotate(0.4);

    // Wing flap
    const flap = swooping ? 0.4 : 0.55 + Math.sin(Date.now() / 110) * 0.4;
    // Back wing
    ctx.save();
    ctx.translate(-2, -4);
    ctx.scale(1, flap);
    const wgBack = ctx.createLinearGradient(-22, 0, 5, 0);
    wgBack.addColorStop(0, '#3e2410');
    wgBack.addColorStop(0.5, '#6d4423');
    wgBack.addColorStop(1, '#8b5a2b');
    ctx.fillStyle = wgBack;
    ctx.beginPath();
    ctx.moveTo(5, 0);
    ctx.quadraticCurveTo(-10, -8, -22, -2);
    ctx.quadraticCurveTo(-18, 2, -10, 4);
    ctx.quadraticCurveTo(-2, 6, 5, 2);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#1a0f0a'; ctx.lineWidth = 0.8; ctx.stroke();
    // Feather lines
    ctx.strokeStyle = 'rgba(30, 20, 10, 0.6)'; ctx.lineWidth = 0.6;
    for (let i = 0; i < 5; i++) {
      const t = i / 4;
      ctx.beginPath();
      ctx.moveTo(-2 - t*18, -1 - t*1.5);
      ctx.lineTo(-2 - t*18, 3);
      ctx.stroke();
    }
    ctx.restore();

    // Body — brown back, white belly
    const bg = ctx.createLinearGradient(0, -8, 0, 10);
    bg.addColorStop(0, '#5d3a1c');
    bg.addColorStop(0.5, '#8b5a2b');
    bg.addColorStop(0.7, '#d7ccc8');
    bg.addColorStop(1, '#f5f5f5');
    ctx.fillStyle = bg;
    ctx.beginPath();
    ctx.ellipse(0, 2, 11, 10, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = '#3e2410'; ctx.lineWidth = 1; ctx.stroke();
    // Belly speckles
    ctx.fillStyle = 'rgba(80, 50, 30, 0.6)';
    for (let i = 0; i < 6; i++) {
      ctx.beginPath();
      ctx.arc(-4 + (i%3)*3, 6 + Math.floor(i/3)*3, 0.7, 0, Math.PI*2);
      ctx.fill();
    }

    // Front wing (on top of body)
    ctx.save();
    ctx.translate(2, -2);
    ctx.scale(1, flap);
    const wgFront = ctx.createLinearGradient(-18, 0, 8, 0);
    wgFront.addColorStop(0, '#5d3a1c');
    wgFront.addColorStop(1, '#8b5a2b');
    ctx.fillStyle = wgFront;
    ctx.beginPath();
    ctx.moveTo(8, 0);
    ctx.quadraticCurveTo(-6, -6, -18, 0);
    ctx.quadraticCurveTo(-12, 4, -4, 5);
    ctx.quadraticCurveTo(2, 5, 8, 2);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#1a0f0a'; ctx.lineWidth = 0.7; ctx.stroke();
    // Primary feathers
    ctx.strokeStyle = 'rgba(40, 25, 12, 0.7)'; ctx.lineWidth = 0.7;
    for (let i = 0; i < 4; i++) {
      const t = i / 3;
      ctx.beginPath();
      ctx.moveTo(-6 - t*10, -2 - t*1.5);
      ctx.lineTo(-4 - t*10, 4);
      ctx.stroke();
    }
    ctx.restore();

    // Tail feathers
    ctx.fillStyle = '#5d3a1c';
    ctx.beginPath();
    ctx.moveTo(-10, 2); ctx.lineTo(-18, 0); ctx.lineTo(-18, 6); ctx.lineTo(-10, 8);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#1a0f0a'; ctx.lineWidth = 0.6; ctx.stroke();
    ctx.strokeStyle = '#3e2410'; ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(-15, 1); ctx.lineTo(-15, 7);
    ctx.moveTo(-12, 2); ctx.lineTo(-12, 7);
    ctx.stroke();

    // Head
    const hg = ctx.createRadialGradient(11, -4, 1, 12, -2, 8);
    hg.addColorStop(0, '#a17350');
    hg.addColorStop(1, '#3e2410');
    ctx.fillStyle = hg;
    ctx.beginPath();
    ctx.arc(11, -3, 7, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = '#1a0f0a'; ctx.lineWidth = 0.8; ctx.stroke();

    // Beak
    const beakG = ctx.createLinearGradient(15, 0, 22, 0);
    beakG.addColorStop(0, '#ffc107');
    beakG.addColorStop(1, '#ff8f00');
    ctx.fillStyle = beakG;
    ctx.beginPath();
    ctx.moveTo(15, -1); ctx.lineTo(22, 1); ctx.lineTo(15, 4);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#5d3a00'; ctx.lineWidth = 0.6; ctx.stroke();
    // Beak hook
    ctx.fillStyle = '#ff8f00';
    ctx.beginPath();
    ctx.moveTo(20, 1); ctx.lineTo(22, 3); ctx.lineTo(19, 3);
    ctx.closePath(); ctx.fill();

    // Eye — sharp yellow with black pupil
    ctx.fillStyle = '#ffd54f';
    ctx.beginPath(); ctx.arc(11, -4, 2.4, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(12, -4, 1.2, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(12.3, -4.4, 0.5, 0, Math.PI*2); ctx.fill();
    // Brow ridge (predator look)
    ctx.strokeStyle = '#1a0f0a'; ctx.lineWidth = 1.4; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(7, -7); ctx.lineTo(14, -6); ctx.stroke();

    // Talons
    ctx.strokeStyle = '#ffc107'; ctx.lineWidth = 1.2; ctx.lineCap = 'round';
    const talonExt = swooping ? 6 : 1;
    for (let i = -1; i <= 1; i++) {
      ctx.beginPath();
      ctx.moveTo(i * 2, 11);
      ctx.lineTo(i * 2, 13 + talonExt);
      ctx.stroke();
    }
    // Sharp talon tips
    ctx.fillStyle = '#5d3a00';
    for (let i = -1; i <= 1; i++) {
      ctx.beginPath();
      ctx.arc(i * 2, 14 + talonExt, 0.8, 0, Math.PI*2);
      ctx.fill();
    }

    ctx.restore();

    // Swoop warning line behind hawk
    if (swooping) {
      ctx.strokeStyle = 'rgba(255, 100, 100, 0.4)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(player.x + player.w/2, player.y + player.h/2);
      ctx.stroke();
    }

    // HP pips for boss
    if (w.boss && w.hp > 0) {
      ctx.fillStyle = '#ef5350';
      ctx.strokeStyle = '#000'; ctx.lineWidth = 1;
      for (let i = 0; i < w.hp; i++) {
        const px = w.x + 8 + i * 10;
        ctx.fillRect(px, w.y - 14, 7, 5);
        ctx.strokeRect(px, w.y - 14, 7, 5);
      }
    }
  }

  function drawPine(t) {
    if (!t.alive) {
      // Snowy stump with embedded axe
      ctx.fillStyle = '#3e2410';
      ctx.fillRect(t.x - 2, t.y - 16, t.w + 4, 16);
      ctx.fillStyle = '#a17350';
      ctx.fillRect(t.x - 2, t.y - 16, t.w + 4, 4);
      // Snow on stump
      ctx.fillStyle = '#fff';
      ctx.fillRect(t.x - 3, t.y - 17, t.w + 6, 2);
      // Axe in stump
      ctx.save();
      ctx.translate(t.x + t.w/2, t.y - 14);
      ctx.rotate(-0.7);
      ctx.fillStyle = '#6d4c2a';
      ctx.fillRect(0, -1.5, 20, 3);
      ctx.fillStyle = '#cfd8dc';
      ctx.beginPath();
      ctx.moveTo(-1, -7); ctx.lineTo(5, -3); ctx.lineTo(5, 3); ctx.lineTo(-1, 7);
      ctx.closePath(); ctx.fill();
      ctx.strokeStyle = '#263238'; ctx.lineWidth = 0.7; ctx.stroke();
      ctx.restore();
      return;
    }
    const sway = Math.sin(t.sway) * 1.5;
    // Trunk
    ctx.fillStyle = '#3e2410';
    ctx.fillRect(t.x + t.w/2 - 5, t.y - 22, 10, 22);
    ctx.strokeStyle = '#1a0f0a'; ctx.lineWidth = 0.6;
    ctx.strokeRect(t.x + t.w/2 - 5, t.y - 22, 10, 22);
    // Three triangular layers of pine
    const cx = t.x + t.w/2 + sway;
    const layers = [
      { y: t.y - 22, width: 36, height: 30 },
      { y: t.y - 48, width: 30, height: 28 },
      { y: t.y - 72, width: 22, height: 26 },
    ];
    for (const L of layers) {
      // Pine triangle
      ctx.fillStyle = '#1b5e20';
      ctx.beginPath();
      ctx.moveTo(cx - L.width, L.y);
      ctx.lineTo(cx + L.width, L.y);
      ctx.lineTo(cx, L.y - L.height);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#0d3f12'; ctx.lineWidth = 0.8; ctx.stroke();
      // Inner highlight (slightly lighter)
      ctx.fillStyle = '#2e7d32';
      ctx.beginPath();
      ctx.moveTo(cx - L.width * 0.6, L.y - 2);
      ctx.lineTo(cx + L.width * 0.6, L.y - 2);
      ctx.lineTo(cx, L.y - L.height * 0.85);
      ctx.closePath();
      ctx.fill();
      // Snow cap (jagged white along top edges)
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.moveTo(cx, L.y - L.height);
      ctx.lineTo(cx - 6, L.y - L.height + 12);
      ctx.lineTo(cx - 2, L.y - L.height + 10);
      ctx.lineTo(cx + 3, L.y - L.height + 14);
      ctx.lineTo(cx + 7, L.y - L.height + 11);
      ctx.lineTo(cx + 4, L.y - L.height + 6);
      ctx.closePath();
      ctx.fill();
      // Snow on the left side too
      ctx.beginPath();
      ctx.moveTo(cx - L.width * 0.6, L.y - 3);
      ctx.lineTo(cx - L.width * 0.5, L.y);
      ctx.lineTo(cx - L.width * 0.3, L.y);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(cx + L.width * 0.4, L.y);
      ctx.lineTo(cx + L.width * 0.5, L.y);
      ctx.lineTo(cx + L.width * 0.55, L.y - 2);
      ctx.closePath();
      ctx.fill();
    }
    // Small star ornament at the very top
    ctx.fillStyle = '#fff59d';
    ctx.beginPath();
    ctx.arc(cx, layers[2].y - layers[2].height - 2, 2, 0, Math.PI*2);
    ctx.fill();

    // HP bar
    if (t.hp < 200) {
      ctx.fillStyle = 'rgba(0,0,0,0.4)';
      ctx.fillRect(t.x - 8, t.y - 110, 44, 6);
      ctx.fillStyle = t.hp > 80 ? '#8bc34a' : '#e53935';
      ctx.fillRect(t.x - 7, t.y - 109, 42 * (t.hp/200), 4);
    }
  }

  function drawBat(w) {
    if (!w.alive) return;
    drawDivineHalo(w);
    const cx = w.x + w.w/2, cy = w.y + w.h/2;

    // Hellish red aura
    const auraR = w.boss ? 50 : 22;
    const aura = ctx.createRadialGradient(cx, cy, 0, cx, cy, auraR);
    aura.addColorStop(0, 'rgba(255, 60, 20, 0.28)');
    aura.addColorStop(1, 'rgba(255, 60, 20, 0)');
    ctx.fillStyle = aura;
    ctx.beginPath(); ctx.arc(cx, cy, auraR, 0, Math.PI*2); ctx.fill();

    if (w.boss) {
      const t = Date.now() / 220;
      for (let i = 0; i < 3; i++) {
        const phase = ((t + i * 0.45) % 1);
        const r = 30 + phase * 28;
        const op = 0.4 * (1 - phase);
        ctx.strokeStyle = `rgba(255, 80, 30, ${op})`;
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.stroke();
      }
    }

    ctx.save();
    ctx.translate(cx, cy);
    const scale = w.boss ? 1.7 : 1;
    ctx.scale(scale, scale);
    const dir = Math.cos(w.t) >= 0 ? 1 : -1;
    ctx.scale(dir, 1);

    // Wings flap fast and erratically
    const flap = 0.3 + Math.abs(Math.sin(Date.now() / 40)) * 0.95;
    ctx.save(); ctx.scale(1, flap);

    // Wing membrane shape — bat scallops (left side, mirrored to right via dir)
    ctx.fillStyle = '#0e0508';
    ctx.beginPath();
    ctx.moveTo(0, -3);
    ctx.lineTo(-18, -10);
    ctx.quadraticCurveTo(-16, -4, -12, -1);
    ctx.lineTo(-15, 4);
    ctx.lineTo(-10, 1);
    ctx.lineTo(-13, 7);

  function drawCelestialWarden(w) {
    if (!w.alive) return;
    drawDivineHalo(w);
    const cx = w.x + w.w/2, cy = w.y + w.h/2;
    const scale = w.boss ? 1.8 : 1;

    // Holy aura (pulsing for boss)
    if (w.boss) {
      const tt = Date.now() / 220;
      for (let i = 0; i < 4; i++) {
        const phase = ((tt + i * 0.35) % 1);
        ctx.strokeStyle = `rgba(255, 220, 130, ${0.45 * (1-phase)})`;
        ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(cx, cy, 50 + phase * 40, 0, Math.PI*2); ctx.stroke();
      }
    }
    const auraR = w.boss ? 70 : 40;
    const aura = ctx.createRadialGradient(cx, cy, 0, cx, cy, auraR);
    aura.addColorStop(0, 'rgba(255, 240, 180, 0.45)');
    aura.addColorStop(0.5, 'rgba(255, 210, 100, 0.25)');
    aura.addColorStop(1, 'rgba(255, 180, 60, 0)');
    ctx.fillStyle = aura;
    ctx.beginPath(); ctx.arc(cx, cy, auraR, 0, Math.PI*2); ctx.fill();

    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(scale, scale);
    const facing = Math.sign((player.x + player.w/2) - cx) || 1;
    ctx.scale(facing, 1);

    // Spread feathered angel wings (white/gold, scalloped feathers)
    const flapW = 0.75 + Math.sin(Date.now() / 220) * 0.2;
    ctx.save(); ctx.scale(1, flapW);
    const wingFeatherColor = w.boss ? '#fff8e0' : '#fdf6dd';
    // Wing base shape (one fill for each side)
    for (const dir of [-1, 1]) {
      ctx.save();
      ctx.scale(dir, 1);
      ctx.fillStyle = wingFeatherColor;
      ctx.beginPath();
      ctx.moveTo(0, -6);
      ctx.quadraticCurveTo(16, -16, 30, -8);
      ctx.quadraticCurveTo(30, 0, 22, 8);
      // Scalloped feather edge
      ctx.lineTo(20, 6); ctx.lineTo(18, 11);
      ctx.lineTo(15, 8); ctx.lineTo(13, 12);
      ctx.lineTo(10, 9); ctx.lineTo(8, 13);
      ctx.lineTo(5, 10); ctx.lineTo(3, 13);
      ctx.lineTo(0, 9);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#c9a45e'; ctx.lineWidth = 0.7; ctx.stroke();
      // Feather lines (golden quills)
      ctx.strokeStyle = '#e3c178'; ctx.lineWidth = 0.6;
      ctx.beginPath();
      ctx.moveTo(0, -4); ctx.lineTo(28, -7);
      ctx.moveTo(0, -2); ctx.lineTo(24, 0);
      ctx.moveTo(0, 1); ctx.lineTo(20, 6);
      ctx.moveTo(0, 3); ctx.lineTo(16, 10);
      ctx.moveTo(0, 5); ctx.lineTo(11, 12);
      ctx.moveTo(0, 7); ctx.lineTo(7, 13);
      ctx.stroke();
      ctx.restore();
    }
    ctx.restore();

    // Body — golden armored torso
    const armorG = ctx.createLinearGradient(0, -10, 0, 18);
    armorG.addColorStop(0, '#ffe082');
    armorG.addColorStop(0.5, '#d4af37');
    armorG.addColorStop(1, '#7a5a00');
    ctx.fillStyle = armorG;
    ctx.beginPath();
    ctx.moveTo(-7, -8);
    ctx.lineTo(-10, 8);
    ctx.lineTo(-12, 18);
    ctx.lineTo(12, 18);
    ctx.lineTo(10, 8);
    ctx.lineTo(7, -8);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#7a5a00'; ctx.lineWidth = 0.9; ctx.stroke();
    // Armor plate divisions (segments / banding)
    ctx.strokeStyle = '#8a6c00'; ctx.lineWidth = 0.7;
    ctx.beginPath();
    ctx.moveTo(-9, 0); ctx.lineTo(9, 0);
    ctx.moveTo(-10, 8); ctx.lineTo(10, 8);
    ctx.stroke();
    // Chest emblem (sun/star)
    ctx.fillStyle = '#fff8d0';
    ctx.beginPath();
    for (let i = 0; i < 8; i++) {
      const a = (i / 8) * Math.PI * 2;
      const r = i % 2 === 0 ? 4 : 1.8;
      const px = Math.cos(a) * r, py = Math.sin(a) * r + 3;
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#7a5a00'; ctx.lineWidth = 0.5; ctx.stroke();
    // Belt
    ctx.fillStyle = '#7a5a00';
    ctx.fillRect(-11, 9, 22, 2);

    // Helmet
    ctx.fillStyle = '#d4af37';
    ctx.beginPath();
    ctx.moveTo(-9, -8);
    ctx.quadraticCurveTo(0, -22, 9, -8);
    ctx.lineTo(8, -3);
    ctx.lineTo(-8, -3);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#7a5a00'; ctx.lineWidth = 0.8; ctx.stroke();
    // Helmet T-slit (visor)
    ctx.fillStyle = '#2a2010';
    ctx.fillRect(-1, -16, 2, 8);
    ctx.fillRect(-5, -10, 10, 2);
    // Helmet ridge crest
    ctx.fillStyle = '#fdf6dd';
    ctx.beginPath();
    ctx.moveTo(-1, -22); ctx.lineTo(1, -22);
    ctx.lineTo(2, -16); ctx.lineTo(-2, -16);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#c9a45e'; ctx.lineWidth = 0.5; ctx.stroke();

    // Glowing white-gold eyes inside helmet visor
    ctx.fillStyle = 'rgba(255, 250, 200, 0.95)';
    ctx.beginPath(); ctx.arc(-2, -12, 1.2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(2, -12, 1.2, 0, Math.PI*2); ctx.fill();

    // Halo above the helmet
    ctx.strokeStyle = `rgba(255, 230, 130, ${w.boss ? 0.9 : 0.75})`;
    ctx.lineWidth = 1.6;
    ctx.beginPath();
    ctx.ellipse(0, -25, 9, 2.5, 0, 0, Math.PI*2);
    ctx.stroke();
    ctx.strokeStyle = 'rgba(255, 255, 220, 0.5)';
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.ellipse(0, -25, 9, 2.5, 0, 0, Math.PI*2);
    ctx.stroke();

    // Spear (boss has a longer ornate sword)
    ctx.save();
    ctx.translate(11, 4);
    ctx.rotate(-0.25);
    if (w.boss) {
      // Two-handed sword
      ctx.fillStyle = '#5d4570';
      ctx.fillRect(0, -1, 4, 2);
      ctx.fillStyle = '#fdf6dd';
      ctx.beginPath();
      ctx.moveTo(4, -2); ctx.lineTo(26, 0); ctx.lineTo(4, 2);
      ctx.closePath(); ctx.fill();
      ctx.strokeStyle = '#7a5a00'; ctx.lineWidth = 0.6; ctx.stroke();
      // Crossguard
      ctx.fillStyle = '#d4af37';
      ctx.fillRect(2, -4, 3, 8);
    } else {
      // Spear
      ctx.fillStyle = '#6d4c2a';
      ctx.fillRect(0, -1, 22, 2);
      ctx.fillStyle = '#fdf6dd';
      ctx.beginPath();
      ctx.moveTo(20, -3); ctx.lineTo(28, 0); ctx.lineTo(20, 3);
      ctx.closePath(); ctx.fill();
      ctx.strokeStyle = '#7a5a00'; ctx.lineWidth = 0.5; ctx.stroke();
      // Gold spear binding
      ctx.fillStyle = '#d4af37';
      ctx.fillRect(18, -2, 2, 4);
    }
    ctx.restore();

    ctx.restore();

    // Boss HP pips
    if (w.boss && w.hp > 0) {
      ctx.fillStyle = '#ffd54f';
      ctx.strokeStyle = '#7a5a00'; ctx.lineWidth = 1;
      for (let i = 0; i < w.hp; i++) {
        const px = w.x + 4 + i * 7;
        ctx.fillRect(px, w.y - 16, 5, 6);
        ctx.strokeRect(px, w.y - 16, 5, 6);
      }
    }
  }

  function drawCelestialPillar(t) {
    if (!t.alive) {
      ctx.fillStyle = '#3e3548';
      ctx.fillRect(t.x - 4, t.y - 14, t.w + 8, 14);
      return;
    }
    const cx = t.x + t.w/2;
    const pulse = 0.6 + 0.4 * Math.sin(Date.now() / 380 + t.sway);
    // Marble pillar base
    ctx.fillStyle = '#e5d9b8';
    ctx.fillRect(t.x - 6, t.y - 8, t.w + 12, 8);
    ctx.strokeStyle = '#8a7440'; ctx.lineWidth = 0.6;
    ctx.strokeRect(t.x - 6, t.y - 8, t.w + 12, 8);
    // Column shaft (fluted)
    const colG = ctx.createLinearGradient(t.x, 0, t.x + t.w, 0);
    colG.addColorStop(0, '#b8a878');
    colG.addColorStop(0.5, '#f5ebcf');
    colG.addColorStop(1, '#b8a878');
    ctx.fillStyle = colG;
    ctx.fillRect(t.x, t.y - 90, t.w, 82);
    ctx.strokeStyle = '#8a7440'; ctx.lineWidth = 0.5;
    // Fluting lines
    for (let i = 1; i < 4; i++) {
      const fx = t.x + (t.w * i / 4);
      ctx.beginPath();
      ctx.moveTo(fx, t.y - 88); ctx.lineTo(fx, t.y - 10);
      ctx.stroke();
    }
    // Golden capital
    ctx.fillStyle = '#d4af37';
    ctx.fillRect(t.x - 6, t.y - 100, t.w + 12, 10);
    ctx.strokeStyle = '#7a5a00'; ctx.lineWidth = 0.7;
    ctx.strokeRect(t.x - 6, t.y - 100, t.w + 12, 10);
    // Glowing orb above pillar
    const orbAura = ctx.createRadialGradient(cx, t.y - 112, 0, cx, t.y - 112, 22);
    orbAura.addColorStop(0, `rgba(255, 240, 150, ${0.65 * pulse})`);
    orbAura.addColorStop(1, 'rgba(255, 200, 80, 0)');
    ctx.fillStyle = orbAura;
    ctx.beginPath(); ctx.arc(cx, t.y - 112, 22, 0, Math.PI*2); ctx.fill();
    // Orb core
    ctx.fillStyle = '#fff8d6';
    ctx.beginPath(); ctx.arc(cx, t.y - 112, 5 + pulse, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(cx - 1, t.y - 113, 2, 0, Math.PI*2); ctx.fill();

    // Divine light rays
    ctx.strokeStyle = `rgba(255, 230, 130, ${0.4 * pulse})`;
    ctx.lineWidth = 1;
    for (let i = 0; i < 6; i++) {
      const a = (i / 6) * Math.PI * 2 + Date.now() / 1500;
      ctx.beginPath();
      ctx.moveTo(cx + Math.cos(a) * 8, t.y - 112 + Math.sin(a) * 8);
      ctx.lineTo(cx + Math.cos(a) * 18, t.y - 112 + Math.sin(a) * 18);
      ctx.stroke();
    }

    // Glowing runes on column
    ctx.fillStyle = `rgba(255, 215, 80, ${0.5 + 0.4 * pulse})`;
    ctx.fillRect(cx - 2, t.y - 60, 4, 2);
    ctx.fillRect(cx - 4, t.y - 58, 2, 2);
    ctx.fillRect(cx + 2, t.y - 58, 2, 2);
    ctx.fillRect(cx - 1, t.y - 56, 2, 2);
    // Second rune cluster
    ctx.fillRect(cx - 3, t.y - 40, 6, 1);
    ctx.fillRect(cx - 1, t.y - 38, 2, 4);

    // HP bar
    if (t.hp < 200) {
      ctx.fillStyle = 'rgba(0,0,0,0.4)';
      ctx.fillRect(t.x - 8, t.y - 135, 44, 6);
      ctx.fillStyle = t.hp > 80 ? '#d4af37' : '#e53935';
      ctx.fillRect(t.x - 7, t.y - 134, 42 * (t.hp/200), 4);
    }
  }

  function drawWisp(w) {
    if (!w.alive) return;
    drawDivineHalo(w);
    const cx = w.x + w.w/2, cy = w.y + w.h/2;
    // Alpha based on phased state — fade smoothly during phase transition
    let alpha = 1;
    if (w.phaseT > 100 && w.phaseT <= 110) {
      // Fading out
      alpha = 1 - (w.phaseT - 100) / 10 * 0.7;
    } else if (w.phaseT > 110 && w.phaseT < 170) {
      // Fully phased
      alpha = 0.3;
    } else if (w.phaseT >= 170) {
      // Fading back in
      alpha = 0.3 + (w.phaseT - 170) / 10 * 0.7;
    }

    // Outer ambient glow
    const auraR = w.boss ? 60 : 32;
    const aura = ctx.createRadialGradient(cx, cy, 0, cx, cy, auraR);
    aura.addColorStop(0, `rgba(180, 120, 255, ${0.5 * alpha})`);
    aura.addColorStop(0.5, `rgba(140, 100, 230, ${0.25 * alpha})`);
    aura.addColorStop(1, 'rgba(140, 100, 230, 0)');
    ctx.fillStyle = aura;
    ctx.beginPath(); ctx.arc(cx, cy, auraR, 0, Math.PI*2); ctx.fill();

    if (w.boss) {
      const tt = Date.now() / 250;
      for (let i = 0; i < 3; i++) {
        const phase = ((tt + i * 0.4) % 1);
        ctx.strokeStyle = `rgba(200, 130, 255, ${0.4 * (1-phase) * alpha})`;
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(cx, cy, 36 + phase * 28, 0, Math.PI*2); ctx.stroke();
      }
    }

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(cx, cy);
    const scale = w.boss ? 1.6 : 1;
    ctx.scale(scale, scale);

    // Subtle hover bob
    const bobW = Math.sin(Date.now() / 220 + w.t * 3) * 1.6;
    ctx.translate(0, bobW);

    // Outer ghostly body — wisp shape (head + flame tail)
    const bodyG = ctx.createRadialGradient(0, -2, 1, 0, 0, 14);
    bodyG.addColorStop(0, 'rgba(255, 255, 255, 0.95)');
    bodyG.addColorStop(0.45, 'rgba(220, 200, 255, 0.7)');
    bodyG.addColorStop(1, 'rgba(140, 100, 230, 0.3)');
    ctx.fillStyle = bodyG;
    // Head bulb
    ctx.beginPath();
    ctx.arc(0, -3, 10, 0, Math.PI);
    // Wavy flame-like tail
    const wave = Math.sin(Date.now() / 100) * 1.5;
    ctx.bezierCurveTo(-10, 4, -8 + wave, 8, -6 + wave, 12);
    ctx.bezierCurveTo(-4, 14, -2 - wave, 10, 0, 14);
    ctx.bezierCurveTo(2 + wave, 10, 4, 14, 6 - wave, 12);
    ctx.bezierCurveTo(8 - wave, 8, 10, 4, 10, -3);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = 'rgba(180, 140, 220, 0.7)';
    ctx.lineWidth = 0.7;
    ctx.stroke();

    // Inner bright core
    const coreG = ctx.createRadialGradient(0, -4, 1, 0, -3, 8);
    coreG.addColorStop(0, 'rgba(255, 255, 255, 1)');
    coreG.addColorStop(0.6, 'rgba(220, 180, 255, 0.85)');
    coreG.addColorStop(1, 'rgba(180, 120, 255, 0.4)');
    ctx.fillStyle = coreG;
    ctx.beginPath();
    ctx.arc(0, -3, 7, 0, Math.PI*2);
    ctx.fill();

    // Two glowing eyes
    ctx.fillStyle = 'rgba(60, 20, 120, 0.85)';
    ctx.beginPath(); ctx.arc(-3, -4, 1.4, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(3, -4, 1.4, 0, Math.PI*2); ctx.fill();
    // Sad mouth
    ctx.strokeStyle = 'rgba(60, 20, 120, 0.6)'; ctx.lineWidth = 0.7;
    ctx.beginPath();
    ctx.arc(0, 1, 2, Math.PI * 1.2, Math.PI * 1.8);
    ctx.stroke();

    // Small floating sparkle orbs around the wisp
    const so = Date.now() / 300;
    for (let i = 0; i < 4; i++) {
      const a = so + i * Math.PI / 2;
      const r = 14 + Math.sin(so * 2 + i) * 2;
      const sx = Math.cos(a) * r;
      const sy = Math.sin(a) * r * 0.6;
      ctx.fillStyle = 'rgba(220, 180, 255, 0.7)';
      ctx.beginPath(); ctx.arc(sx, sy, 1.2, 0, Math.PI*2); ctx.fill();
    }

    ctx.restore();

    // Boss HP pips
    if (w.boss && w.hp > 0) {
      ctx.fillStyle = '#ce93d8';
      ctx.strokeStyle = '#000'; ctx.lineWidth = 1;
      for (let i = 0; i < w.hp; i++) {
        const px = w.x + 8 + i * 10;
        ctx.fillRect(px, w.y - 14, 7, 5);
        ctx.strokeRect(px, w.y - 14, 7, 5);
      }
    }
  }

  function drawMushroomTree(t) {
    if (!t.alive) {
      // Fallen mushroom stump — base only
      ctx.fillStyle = '#5d4570';
      ctx.fillRect(t.x - 4, t.y - 12, t.w + 8, 12);
      ctx.fillStyle = '#9e88b0';
      ctx.fillRect(t.x - 4, t.y - 12, t.w + 8, 3);
      // Tiny lingering glow
      ctx.fillStyle = 'rgba(180, 120, 255, 0.4)';
      ctx.beginPath(); ctx.arc(t.x + t.w/2, t.y - 8, 3, 0, Math.PI*2); ctx.fill();
      return;
    }
    const cx = t.x + t.w/2;
    const pulse = 0.55 + 0.45 * Math.sin(Date.now() / 450 + t.sway * 2);

    // Stem — pale fungal column with subtle bulges
    const stemG = ctx.createLinearGradient(t.x - 4, 0, t.x + t.w + 4, 0);
    stemG.addColorStop(0, '#b0a4c0');
    stemG.addColorStop(0.5, '#e1d4ea');
    stemG.addColorStop(1, '#b0a4c0');
    ctx.fillStyle = stemG;
    ctx.beginPath();
    ctx.moveTo(t.x - 3, t.y);
    ctx.lineTo(t.x - 5, t.y - 30);
    ctx.lineTo(t.x - 4, t.y - 60);
    ctx.lineTo(t.x - 6, t.y - 80);
    ctx.lineTo(t.x + t.w + 6, t.y - 80);
    ctx.lineTo(t.x + t.w + 4, t.y - 60);
    ctx.lineTo(t.x + t.w + 5, t.y - 30);
    ctx.lineTo(t.x + t.w + 3, t.y);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#7e6890'; ctx.lineWidth = 0.7;
    ctx.stroke();
    // Glowing bioluminescent spots on stem
    ctx.fillStyle = `rgba(150, 220, 255, ${0.4 + 0.5 * pulse})`;
    ctx.beginPath(); ctx.arc(cx - 6, t.y - 50, 2.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + 4, t.y - 30, 2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + 2, t.y - 65, 2.2, 0, Math.PI*2); ctx.fill();

    // Cap aura
    const aura = ctx.createRadialGradient(cx, t.y - 88, 6, cx, t.y - 88, 50);
    aura.addColorStop(0, `rgba(200, 130, 255, ${0.4 + 0.25 * pulse})`);
    aura.addColorStop(1, 'rgba(140, 90, 230, 0)');
    ctx.fillStyle = aura;
    ctx.beginPath(); ctx.arc(cx, t.y - 88, 50, 0, Math.PI*2); ctx.fill();

    // Cap rim (under the dome)
    ctx.fillStyle = '#4a148c';
    ctx.beginPath();
    ctx.ellipse(cx, t.y - 78, 32, 5, 0, 0, Math.PI*2);
    ctx.fill();

    // Cap — purple gradient dome
    const capG = ctx.createRadialGradient(cx - 6, t.y - 92, 4, cx, t.y - 86, 36);
    capG.addColorStop(0, '#ce93d8');
    capG.addColorStop(0.45, '#9c27b0');
    capG.addColorStop(1, '#4a148c');
    ctx.fillStyle = capG;
    ctx.beginPath();
    ctx.ellipse(cx, t.y - 80, 34, 22, 0, Math.PI, 0);
    ctx.fill();
    ctx.strokeStyle = '#311b92'; ctx.lineWidth = 1;
    ctx.stroke();

    // Cap highlight
    ctx.strokeStyle = 'rgba(255, 230, 255, 0.5)'; ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.ellipse(cx - 6, t.y - 96, 14, 4, -0.2, 0, Math.PI);
    ctx.stroke();

    // Glowing bioluminescent spots on cap
    const spots = [
      [-14, -90, 4], [8, -94, 5], [-2, -84, 3.5],
      [18, -82, 3], [-20, -82, 3]
    ];
    for (const [dx, dy, r] of spots) {
      ctx.fillStyle = `rgba(230, 200, 255, ${0.65 + 0.3 * pulse})`;
      ctx.beginPath(); ctx.arc(cx + dx, t.y + dy, r, 0, Math.PI*2); ctx.fill();
      // Inner bright core
      ctx.fillStyle = `rgba(255, 255, 255, ${0.5 + 0.4 * pulse})`;
      ctx.beginPath(); ctx.arc(cx + dx, t.y + dy, r * 0.5, 0, Math.PI*2); ctx.fill();
    }

    // Spore particles drifting from cap
    const spt = Date.now() / 800;
    for (let i = 0; i < 3; i++) {
      const phase = (spt + i * 0.4 + t.sway) % 1;
      const spx = cx + Math.sin(spt * 2 + i) * 15;
      const spy = t.y - 88 - phase * 30;
      ctx.fillStyle = `rgba(220, 180, 255, ${0.7 * (1 - phase)})`;
      ctx.beginPath(); ctx.arc(spx, spy, 1.4, 0, Math.PI*2); ctx.fill();
    }

    // HP bar
    if (t.hp < 200) {
      ctx.fillStyle = 'rgba(0,0,0,0.4)';
      ctx.fillRect(t.x - 8, t.y - 125, 44, 6);
      ctx.fillStyle = t.hp > 80 ? '#ce93d8' : '#e53935';
      ctx.fillRect(t.x - 7, t.y - 124, 42 * (t.hp/200), 4);
    }
  }

  function drawCharredTree(t) {
    if (!t.alive) {
      // Smoldering stump
      ctx.fillStyle = '#0a0405';
      ctx.fillRect(t.x - 2, t.y - 12, t.w + 4, 12);
      ctx.fillStyle = '#3a1f10';
      ctx.fillRect(t.x - 2, t.y - 12, t.w + 4, 3);
      // Glowing crack
      ctx.strokeStyle = '#ff5722'; ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(t.x + t.w/2 - 4, t.y - 11);
      ctx.lineTo(t.x + t.w/2 + 4, t.y - 4);
      ctx.stroke();
      return;
    }
    const cx = t.x + t.w/2;
    // Skeletal black trunk (knobby)
    ctx.fillStyle = '#0a0303';
    ctx.fillRect(t.x, t.y - 100, t.w, 100);
    ctx.strokeStyle = '#3a1f10'; ctx.lineWidth = 0.5;
    ctx.strokeRect(t.x, t.y - 100, t.w, 100);
    // Glowing ember cracks in trunk (pulsing)
    const pulse = 0.55 + 0.45 * Math.sin(Date.now() / 350 + t.sway * 3);
    ctx.strokeStyle = `rgba(255, ${80 + 80 * pulse}, 20, ${0.55 + 0.35 * pulse})`;
    ctx.lineWidth = 1.4;
    ctx.beginPath();
    ctx.moveTo(t.x + 5, t.y - 25);
    ctx.lineTo(t.x + 9, t.y - 55);
    ctx.lineTo(t.x + 4, t.y - 78);
    ctx.moveTo(t.x + t.w - 6, t.y - 40);
    ctx.lineTo(t.x + t.w - 3, t.y - 70);
    ctx.lineTo(t.x + t.w - 8, t.y - 92);
    ctx.stroke();

    // Skeletal branches (black, twisted)
    ctx.strokeStyle = '#0a0303'; ctx.lineWidth = 3; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(cx, t.y - 55);
    ctx.lineTo(t.x - 18, t.y - 78);
    ctx.moveTo(cx, t.y - 68);
    ctx.lineTo(t.x + t.w + 18, t.y - 86);
    ctx.moveTo(cx, t.y - 85);
    ctx.lineTo(t.x - 10, t.y - 108);
    ctx.moveTo(cx, t.y - 92);
    ctx.lineTo(t.x + t.w + 12, t.y - 112);
    ctx.stroke();
    // Twigs
    ctx.lineWidth = 1.6;
    ctx.beginPath();
    ctx.moveTo(t.x - 18, t.y - 78); ctx.lineTo(t.x - 26, t.y - 82);
    ctx.moveTo(t.x - 18, t.y - 78); ctx.lineTo(t.x - 22, t.y - 70);
    ctx.moveTo(t.x + t.w + 18, t.y - 86); ctx.lineTo(t.x + t.w + 26, t.y - 90);
    ctx.moveTo(t.x + t.w + 18, t.y - 86); ctx.lineTo(t.x + t.w + 24, t.y - 78);
    ctx.moveTo(t.x - 10, t.y - 108); ctx.lineTo(t.x - 16, t.y - 114);
    ctx.moveTo(t.x + t.w + 12, t.y - 112); ctx.lineTo(t.x + t.w + 18, t.y - 118);
    ctx.stroke();
    // Glowing ember dots on branch tips
    const emberC = `rgba(255, ${120 + 100 * pulse}, 20, ${0.7 + 0.25 * pulse})`;
    ctx.fillStyle = emberC;
    ctx.beginPath(); ctx.arc(t.x - 26, t.y - 82, 1.8, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(t.x + t.w + 26, t.y - 90, 1.8, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(t.x - 16, t.y - 114, 1.8, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(t.x + t.w + 18, t.y - 118, 1.8, 0, Math.PI*2); ctx.fill();
    // Big pulsing ember crown
    ctx.fillStyle = `rgba(255, 200, 30, ${0.35 + 0.4 * pulse})`;
    ctx.beginPath();
    ctx.arc(cx, t.y - 100, 4 + pulse * 1.6, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = `rgba(255, 235, 80, ${0.5 + 0.3 * pulse})`;
    ctx.beginPath();
    ctx.arc(cx, t.y - 100, 2 + pulse * 0.8, 0, Math.PI*2);
    ctx.fill();

    // HP bar
    if (t.hp < 200) {
      ctx.fillStyle = 'rgba(0,0,0,0.4)';
      ctx.fillRect(t.x - 8, t.y - 130, 44, 6);
      ctx.fillStyle = t.hp > 80 ? '#ff8f00' : '#e53935';
      ctx.fillRect(t.x - 7, t.y - 129, 42 * (t.hp/200), 4);
    }
  }

  function drawAxe(a) {
    // Motion trail
    ctx.strokeStyle = 'rgba(180,180,180,0.25)'; ctx.lineWidth = 1.5;
    for (let i = 1; i <= 3; i++) {
      ctx.beginPath();
      ctx.moveTo(a.x - a.vx * (i*0.5), a.y - a.vy * (i*0.5));
      ctx.lineTo(a.x - a.vx * ((i+1)*0.5), a.y - a.vy * ((i+1)*0.5));
      ctx.stroke();
    }
    ctx.save();
    ctx.translate(a.x, a.y);
    ctx.rotate(a.rot);
    // Handle
    ctx.fillStyle = '#6d4c2a';
    ctx.fillRect(-12, -1.8, 24, 3.6);
    ctx.strokeStyle = '#3e2723'; ctx.lineWidth = 0.6;
    ctx.strokeRect(-12, -1.8, 24, 3.6);
    // Wraps near grip
    ctx.strokeStyle = '#3e2723'; ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.moveTo(-10, -2); ctx.lineTo(-10, 2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-7, -2); ctx.lineTo(-7, 2); ctx.stroke();
    // Head (steel)
    const hg = ctx.createLinearGradient(8, -8, 16, 8);
    hg.addColorStop(0, '#eceff1');
    hg.addColorStop(0.5, '#90a4ae');
    hg.addColorStop(1, '#455a64');
    ctx.fillStyle = hg;
    ctx.beginPath();
    ctx.moveTo(10, -8); ctx.lineTo(17, -4); ctx.lineTo(17, 4); ctx.lineTo(10, 8);
    ctx.lineTo(8, 4); ctx.lineTo(8, -4); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#263238'; ctx.lineWidth = 0.7; ctx.stroke();
    // Blade highlight
    ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(11, -6); ctx.lineTo(15, -2); ctx.stroke();
    ctx.restore();
  }

  function drawWasp(w) {
    if (!w.alive) return;
    drawDivineHalo(w);
    const cx = w.x + w.w/2, cy = w.y + w.h/2;

    // ===== Boss aura — pulsing rings + soft radial glow =====
    if (w.boss) {
      const t = Date.now() / 250;
      for (let i = 0; i < 3; i++) {
        const phase = ((t + i * 0.4) % 1);
        const r = 32 + phase * 22;
        const op = 0.38 * (1 - phase);
        ctx.strokeStyle = `rgba(255, 70, 70, ${op})`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI*2);
        ctx.stroke();
      }
      const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, 52);
      glow.addColorStop(0, 'rgba(255, 80, 80, 0.22)');
      glow.addColorStop(1, 'rgba(255, 80, 80, 0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(cx, cy, 52, 0, Math.PI*2);
      ctx.fill();
    }

    ctx.save();
    ctx.translate(cx, cy);
    const scale = w.boss ? 1.5 : 1;
    ctx.scale(scale, scale);
    const dir = Math.cos(w.t) >= 0 ? 1 : -1;
    ctx.scale(dir, 1);
    // Subtle hover bob
    ctx.translate(0, Math.sin(w.t * 6) * 0.5);

    // ===== Wing motion-blur halo (drawn under wings) =====
    ctx.strokeStyle = 'rgba(200, 220, 240, 0.13)';
    ctx.lineWidth = 1;
    for (let i = 0; i < 4; i++) {
      ctx.beginPath();
      ctx.ellipse(-1, -11, 14 + i * 1.4, 7 + i * 0.7, 0, 0, Math.PI*2);
      ctx.stroke();
    }

    // ===== Wings (two pairs, iridescent) =====
    const flap = 0.32 + (1 + Math.sin(Date.now() / 22)) * 0.45;
    const drawWing = (wx, wy, rx, ry, ang, alpha) => {
      ctx.save();
      ctx.translate(wx, wy);
      ctx.rotate(ang);
      ctx.scale(1, flap);
      const wg = ctx.createRadialGradient(0, 0, 0, 0, 0, rx);
      wg.addColorStop(0,   `rgba(225, 240, 255, ${alpha * 0.95})`);
      wg.addColorStop(0.55,`rgba(180, 210, 240, ${alpha * 0.5})`);
      wg.addColorStop(1,   `rgba(140, 170, 200, ${alpha * 0.25})`);
      ctx.fillStyle = wg;
      ctx.beginPath();
      ctx.ellipse(0, 0, rx, ry, 0, 0, Math.PI*2);
      ctx.fill();
      // Border
      ctx.strokeStyle = `rgba(60, 90, 130, ${alpha * 0.55})`;
      ctx.lineWidth = 0.7;
      ctx.stroke();
      // Veins
      ctx.strokeStyle = `rgba(80, 110, 140, ${alpha * 0.5})`;
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(-rx * 0.75, 0); ctx.lineTo(rx * 0.75, 0);
      ctx.moveTo(-rx * 0.3, -ry * 0.65); ctx.lineTo(rx * 0.45, ry * 0.4);
      ctx.moveTo(-rx * 0.3, ry * 0.65); ctx.lineTo(rx * 0.45, -ry * 0.4);
      ctx.stroke();
      // Iridescent shimmer patch
      ctx.fillStyle = `rgba(220, 200, 255, ${alpha * 0.4})`;
      ctx.beginPath();
      ctx.ellipse(-rx * 0.25, -ry * 0.35, rx * 0.3, ry * 0.3, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    };
    // Back pair (larger, fainter)
    drawWing(-4, -11, 13, 7, -0.4, 0.4);
    drawWing(4,  -11, 13, 7,  0.4, 0.4);
    // Front pair (smaller, more opaque)
    drawWing(-2, -8, 9, 5, -0.3, 0.6);
    drawWing(2,  -8, 9, 5,  0.3, 0.6);

    // ===== Dangling legs (6) =====
    ctx.strokeStyle = '#1a0f0f';
    ctx.lineWidth = 1;
    ctx.lineCap = 'round';
    const legSway = Math.sin(Date.now() / 80) * 1.2;
    const legXs = [-5, -2, 1, -4, 0, 3];
    const legLens = [9, 10, 8, 9, 11, 9];
    for (let i = 0; i < legXs.length; i++) {
      const lx = legXs[i], ll = legLens[i];
      ctx.beginPath();
      ctx.moveTo(lx, 4);
      ctx.quadraticCurveTo(lx + legSway, 4 + ll/2, lx - 1 + legSway*1.2, 4 + ll);
      ctx.stroke();
    }

    // ===== Abdomen — yellow with curved black stripes =====
    const ag = ctx.createRadialGradient(2, -3, 1, 3, 2, 12);
    ag.addColorStop(0,    '#fff59d');
    ag.addColorStop(0.45, '#ffc107');
    ag.addColorStop(1,    '#7d4900');
    ctx.fillStyle = ag;
    ctx.beginPath();
    ctx.ellipse(3, 0, 11, 8, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = '#3e2723';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Curved stripes clipped to abdomen
    ctx.save();
    ctx.beginPath();
    ctx.ellipse(3, 0, 11, 8, 0, 0, Math.PI*2);
    ctx.clip();
    ctx.fillStyle = '#1a0f0f';
    for (let s = 0; s < 3; s++) {
      const sx = -2 + s * 5;
      ctx.beginPath();
      ctx.ellipse(sx, 0, 1.6, 10, 0.06, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();

    // Abdomen top highlight
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
    ctx.lineWidth = 1.4;
    ctx.beginPath();
    ctx.ellipse(3, -4, 7, 1.6, 0, 0, Math.PI);
    ctx.stroke();

    // ===== Stinger =====
    const sg = ctx.createLinearGradient(13, 0, 24, 0);
    sg.addColorStop(0,   '#3e2723');
    sg.addColorStop(0.5, '#ff6f00');
    sg.addColorStop(1,   '#ffeb3b');
    ctx.fillStyle = sg;
    ctx.beginPath();
    ctx.moveTo(13, -3.5); ctx.lineTo(24, 0); ctx.lineTo(13, 3.5);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#3e2723';
    ctx.lineWidth = 0.6;
    ctx.stroke();
    // Glowing drip on tip
    ctx.fillStyle = 'rgba(255, 235, 59, 0.7)';
    ctx.beginPath(); ctx.arc(24, 0, 2.5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(24.5, -0.6, 0.7, 0, Math.PI*2); ctx.fill();

    // ===== Thorax — fuzzy, dark =====
    const tg = ctx.createRadialGradient(-8, -3, 1, -7, 0, 8);
    tg.addColorStop(0, '#8d6e63');
    tg.addColorStop(1, '#3e2723');
    ctx.fillStyle = tg;
    ctx.beginPath();
    ctx.ellipse(-7, 0, 6, 6, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = '#1a0f0f';
    ctx.lineWidth = 0.8;
    ctx.stroke();
    // Fuzzy radial hairs around thorax
    ctx.strokeStyle = 'rgba(80, 50, 30, 0.65)';
    ctx.lineWidth = 0.8;
    for (let i = 0; i < 12; i++) {
      const a = (i / 12) * Math.PI * 2;
      const sx = -7 + Math.cos(a) * 5.5;
      const sy = Math.sin(a) * 5.5;
      ctx.beginPath();
      ctx.moveTo(sx, sy);
      ctx.lineTo(sx + Math.cos(a) * 2.2, sy + Math.sin(a) * 2.2);
      ctx.stroke();
    }

    // ===== Head =====
    const hg = ctx.createRadialGradient(-15, -2, 1, -14, 0, 8);
    hg.addColorStop(0, '#6d4c2a');
    hg.addColorStop(1, '#1a0f0f');
    ctx.fillStyle = hg;
    ctx.beginPath();
    ctx.ellipse(-14, 0, 6.5, 6, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 0.8;
    ctx.stroke();

    // ===== Antennae — elegant bezier curves with golden bulbs =====
    ctx.strokeStyle = '#1a0f0f';
    ctx.lineWidth = 1.4;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(-16, -4);
    ctx.bezierCurveTo(-20, -10, -18, -16, -14, -17);
    ctx.moveTo(-13, -5);
    ctx.bezierCurveTo(-12, -12, -10, -16, -8, -16);
    ctx.stroke();
    // Antenna bulbs
    ctx.fillStyle = '#ffd54f';
    ctx.beginPath(); ctx.arc(-14, -17, 1.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(-8,  -16, 1.5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(-14.4, -17.4, 0.55, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(-8.4,  -16.4, 0.55, 0, Math.PI*2); ctx.fill();

    // ===== Compound eye — gradient + facet grid + glossy highlights =====
    const eg = ctx.createRadialGradient(-15, -1, 0.5, -15, 0, 4);
    eg.addColorStop(0,   '#ff5252');
    eg.addColorStop(0.6, '#c62828');
    eg.addColorStop(1,   '#3d0000');
    ctx.fillStyle = eg;
    ctx.beginPath();
    ctx.ellipse(-15, 0, 3.6, 3.1, -0.25, 0, Math.PI*2);
    ctx.fill();
    // Facet grid (clipped to eye)
    ctx.save();
    ctx.beginPath();
    ctx.ellipse(-15, 0, 3.6, 3.1, -0.25, 0, Math.PI*2);
    ctx.clip();
    ctx.strokeStyle = 'rgba(0, 0, 0, 0.35)';
    ctx.lineWidth = 0.4;
    for (let i = -3; i <= 3; i++) {
      ctx.beginPath();
      ctx.moveTo(-15 + i * 0.9, -4); ctx.lineTo(-15 + i * 0.9, 4);
      ctx.stroke();
    }
    for (let i = -2; i <= 2; i++) {
      ctx.beginPath();
      ctx.moveTo(-19, i * 0.9); ctx.lineTo(-11, i * 0.9);
      ctx.stroke();
    }
    ctx.restore();
    // Glossy highlights
    ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
    ctx.beginPath(); ctx.arc(-13.8, -1.3, 0.9, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
    ctx.beginPath(); ctx.arc(-16.3, 1.1, 0.5, 0, Math.PI*2); ctx.fill();

    // ===== Angry eyebrow =====
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1.8;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(-19, -5);
    ctx.lineTo(-12, -3);
    ctx.stroke();

    // ===== Mandibles =====
    ctx.fillStyle = '#1a0f0f';
    ctx.beginPath();
    ctx.moveTo(-19, 2.5); ctx.lineTo(-22, 3.5); ctx.lineTo(-19, 4.5);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-19, 5); ctx.lineTo(-22, 6); ctx.lineTo(-19, 7);
    ctx.closePath(); ctx.fill();

    ctx.restore();

    // HP pips for boss
    if (w.boss && w.hp > 0) {
      ctx.fillStyle = '#ef5350';
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 1;
      for (let i = 0; i < w.hp; i++) {
        const px = w.x + 8 + i * 10;
        ctx.fillRect(px, w.y - 14, 7, 5);
        ctx.strokeRect(px, w.y - 14, 7, 5);
      }
    }
  }

  function drawBanana(b) {
    // Motion trail
    ctx.fillStyle = 'rgba(255, 235, 59, 0.18)';
    for (let i = 1; i <= 3; i++) {
      ctx.beginPath();
      ctx.arc(b.x - b.vx * i * 0.5, b.y - b.vy * i * 0.5, 5 - i, 0, Math.PI*2);
      ctx.fill();
    }

    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.rotate(b.x * 0.04 + b.y * 0.025);

    // Banana body — curved crescent shape
    const grd = ctx.createLinearGradient(0, -6, 0, 6);
    grd.addColorStop(0, '#fff59d');
    grd.addColorStop(0.45, '#fdd835');
    grd.addColorStop(1, '#a8830e');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.moveTo(-11, 2);
    ctx.quadraticCurveTo(-2, -9, 12, -2);
    ctx.quadraticCurveTo(14, 0, 13, 3);
    ctx.quadraticCurveTo(0, -3, -10, 5);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#7a5d00'; ctx.lineWidth = 1; ctx.stroke();

    // Top ridge highlight
    ctx.strokeStyle = 'rgba(255,255,255,0.55)'; ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(-8, 0);
    ctx.quadraticCurveTo(0, -6, 10, -1);
    ctx.stroke();

    // Stem
    ctx.fillStyle = '#5d3a1c';
    ctx.fillRect(-13, 1, 3, 3);
    ctx.fillStyle = '#3d2515';
    ctx.fillRect(-14, 2, 2, 2);
    // Tip
    ctx.fillStyle = '#3d2515';
    ctx.beginPath(); ctx.arc(13, 1, 1.4, 0, Math.PI*2); ctx.fill();

    ctx.restore();
  }

  function drawParticle(p) {
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x, p.y, p.size, p.size);
  }

  // Per-level transition theme (used for title cards)
  const LEVEL_THEMES = {
    1: { color: '#8bc34a', bg: '#1f2e15', name: 'JUNGLE FLOOR',     icon: '🌴' },
    2: { color: '#b9e0f4', bg: '#14223a', name: 'MOUNTAIN PEAK',    icon: '🏔️' },
    3: { color: '#ff8a3d', bg: '#2a0808', name: 'VOLCANIC DEPTHS',  icon: '🌋' },
    4: { color: '#ce93d8', bg: '#1a0a3a', name: 'TWILIGHT FOREST',  icon: '🌌' },
    5: { color: '#ffd54f', bg: '#3a2a08', name: 'ASCENDED REALM',   icon: '⚡' },
  };

  function drawHUDOverlay() {
    if (!gameOver && levelTransition <= 0) return;

    // ===== Cinematic level transition =====
    if (levelTransition > 0) {
      const progress = 1 - levelTransition / Math.max(1, levelTransitionMax);

      // Phase 1: brilliant white flash exploding from the goal (0-30%)
      if (progress < 0.35) {
        const burstP = progress / 0.35;
        const goalScreenX = goal.x + goal.w/2;
        const goalScreenY = goal.y + goal.h/2 - cam.y;
        // Expanding bright ring
        for (let i = 0; i < 3; i++) {
          const ringP = Math.max(0, burstP - i * 0.12);
          if (ringP > 0 && ringP < 1) {
            ctx.strokeStyle = `rgba(255, ${220 + i*10}, ${120 - i*30}, ${0.85 * (1 - ringP)})`;
            ctx.lineWidth = 5 - i;
            ctx.beginPath();
            ctx.arc(goalScreenX, goalScreenY, ringP * 800, 0, Math.PI*2);
            ctx.stroke();
          }
        }
        // Central glow that grows then fades
        const glowR = burstP * 600;
        const glowAlpha = burstP < 0.6 ? burstP / 0.6 : 1 - (burstP - 0.6) / 0.4;
        const glow = ctx.createRadialGradient(goalScreenX, goalScreenY, 0, goalScreenX, goalScreenY, glowR);
        glow.addColorStop(0, `rgba(255, 255, 240, ${0.95 * glowAlpha})`);
        glow.addColorStop(0.3, `rgba(255, 230, 140, ${0.7 * glowAlpha})`);
        glow.addColorStop(1, 'rgba(255, 200, 80, 0)');
        ctx.fillStyle = glow;
        ctx.fillRect(0, 0, VIEW_W, VIEW_H);
        // Particle rays shooting outward
        for (let i = 0; i < 24; i++) {
          const a = (i / 24) * Math.PI * 2 + burstP * 0.3;
          const r0 = burstP * 60;
          const r1 = burstP * 380;
          ctx.strokeStyle = `rgba(255, ${230 - i*4}, 120, ${0.8 * (1 - burstP)})`;
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.moveTo(goalScreenX + Math.cos(a) * r0, goalScreenY + Math.sin(a) * r0);
          ctx.lineTo(goalScreenX + Math.cos(a) * r1, goalScreenY + Math.sin(a) * r1);
          ctx.stroke();
        }
      }

      // Phase 2: full-screen white flash that fades (30-50%)
      if (progress >= 0.2 && progress < 0.55) {
        const fp = (progress - 0.2) / 0.35;
        const alpha = fp < 0.3 ? fp / 0.3 : 1 - (fp - 0.3) / 0.7;
        ctx.fillStyle = `rgba(255, 250, 220, ${alpha * 0.95})`;
        ctx.fillRect(0, 0, VIEW_W, VIEW_H);
      }

      // Phase 3: title card (40-92%)
      if (progress >= 0.4 && progress < 0.95) {
        const t3 = (progress - 0.4) / 0.55;
        const fadeIn  = Math.min(1, t3 * 4);
        const fadeOut = Math.max(0, (t3 - 0.85) * 6);
        const cardA   = fadeIn * Math.max(0, 1 - fadeOut);

        const theme = LEVEL_THEMES[levelTransitionNext] || LEVEL_THEMES[5];

        // Dark themed backdrop
        ctx.fillStyle = `rgba(0, 0, 0, ${0.75 * cardA})`;
        ctx.fillRect(0, 0, VIEW_W, VIEW_H);

        // Animated horizontal lines sliding across (cinema bars)
        const lineY = VIEW_H / 2 - 80;
        ctx.fillStyle = `rgba(255, 255, 255, ${0.4 * cardA})`;
        const lineW = VIEW_W * Math.min(1, t3 * 3);
        ctx.fillRect((VIEW_W - lineW) / 2, lineY, lineW, 1.5);
        ctx.fillRect((VIEW_W - lineW) / 2, VIEW_H / 2 + 70, lineW, 1.5);

        // "LEVEL N"
        ctx.fillStyle = `rgba(255, 255, 255, ${cardA})`;
        ctx.font = 'bold 20px Trebuchet MS';
        ctx.textAlign = 'center';
        ctx.fillText('LEVEL ' + levelTransitionNext, VIEW_W/2, VIEW_H/2 - 30);

        // Big theme name with glow
        ctx.save();
        ctx.shadowColor = theme.color;
        ctx.shadowBlur = 30 * cardA;
        ctx.fillStyle = theme.color;
        ctx.font = 'bold 44px Trebuchet MS';
        // Slight x-slide-in
        const xOff = (1 - fadeIn) * 40;
        ctx.fillText(theme.name, VIEW_W/2 + xOff, VIEW_H/2 + 15);
        ctx.restore();

        // Side icons
        ctx.fillStyle = `rgba(255, 255, 255, ${cardA})`;
        ctx.font = '40px Trebuchet MS';
        const iconOff = 220 + (1 - fadeIn) * 80;
        ctx.fillText(theme.icon, VIEW_W/2 - iconOff, VIEW_H/2 + 12);
        ctx.fillText(theme.icon, VIEW_W/2 + iconOff, VIEW_H/2 + 12);

        // Subtitle (message text)
        ctx.fillStyle = `rgba(255, 255, 255, ${0.85 * cardA})`;
        ctx.font = '16px Trebuchet MS';
        ctx.fillText(message, VIEW_W/2, VIEW_H/2 + 50);
      }

      // Phase 4: quick fade to black at the very end (95-100%)
      if (progress >= 0.92) {
        const fp = (progress - 0.92) / 0.08;
        ctx.fillStyle = `rgba(0, 0, 0, ${fp * 0.95})`;
        ctx.fillRect(0, 0, VIEW_W, VIEW_H);
      }
      return;
    }

    // ===== Game over (win/lose final) =====
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, VIEW_W, VIEW_H);
    ctx.fillStyle = win ? '#a5d6a7' : '#ef9a9a';
    ctx.font = 'bold 36px Trebuchet MS';
    ctx.textAlign = 'center';
    ctx.fillText(message, VIEW_W/2, VIEW_H/2 - 20);
    ctx.fillStyle = '#fff';
    ctx.font = '18px Trebuchet MS';
    ctx.fillText(`Score: ${score}    Height: ${maxHeight}m    Press R to play again`, VIEW_W/2, VIEW_H/2 + 20);
  }

  function updateHud() {
    document.getElementById('lives').textContent = player.lives;
    document.getElementById('trees').textContent = trees.filter(t => t.alive).length;
    document.getElementById('loggers').textContent = loggers.filter(l => l.alive).length;
    document.getElementById('wasps').textContent = wasps.filter(w => w.alive).length;
    document.getElementById('score').textContent = score;
    document.getElementById('height').textContent = maxHeight;
    document.getElementById('level').textContent = level;
    document.getElementById('enemyLabel').textContent =
      level === 5 ? '✨ Divine' :
      level === 4 ? '👻 Wisps' :
      level === 3 ? '🦇 Bats' :
      level === 2 ? '🦅 Hawks' : '🐝 Wasps';
  }

  function render() {
    ctx.clearRect(0, 0, VIEW_W, VIEW_H);
    ctx.save();
    ctx.translate(0, -cam.y);
    drawBackground();
    drawPlatforms();
    pickups.forEach(drawPickup);
    drawGoal(goal);
    const treeDrawer =
      level === 5 ? drawCelestialPillar :
      level === 4 ? drawMushroomTree :
      level === 3 ? drawCharredTree :
      level === 2 ? drawPine : drawTree;
    trees.forEach(treeDrawer);
    loggers.forEach(drawLogger);
    wasps.forEach(w => {
      if (w.type === 'hawk') drawHawk(w);
      else if (w.type === 'bat') drawBat(w);
      else if (w.type === 'wisp') drawWisp(w);
      else if (w.type === 'warden') drawCelestialWarden(w);
      else drawWasp(w);
    });
    axes.forEach(drawAxe);
    bananas.forEach(drawBanana);
    particles.forEach(drawParticle);
    drawMonkey(player);
    ctx.restore();
    drawClimbMarker();
    drawHUDOverlay();
  }

  function drawClimbMarker() {
    // Up-arrow hint when goal is above viewport
    if (gameOver) return;
    if (goal.y + goal.h < cam.y) {
      ctx.fillStyle = 'rgba(255, 215, 0, 0.85)';
      ctx.beginPath();
      ctx.moveTo(VIEW_W - 40, 30);
      ctx.lineTo(VIEW_W - 20, 30);
      ctx.lineTo(VIEW_W - 30, 12);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#000';
      ctx.font = 'bold 11px Trebuchet MS';
      ctx.textAlign = 'center';
      ctx.fillText('UP', VIEW_W - 30, 46);
    }
  }

  function loop() {
    update();
    render();
    requestAnimationFrame(loop);
  }

  resetGame();
  loop();
})();
</script>
</body>
</html>
