<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jungle Defender — Save the Trees!</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #0b1d12;
    color: #e8f5e9;
    font-family: 'Trebuchet MS', sans-serif;
    overflow: hidden;
    height: 100%;
  }
  #wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
  }
  canvas {
    background: #87ceeb;
    border: 4px solid #3e2a14;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    image-rendering: pixelated;
  }
  #hud {
    margin-bottom: 8px;
    font-size: 14px;
    letter-spacing: 1px;
  }
  #help {
    margin-top: 8px;
    font-size: 12px;
    opacity: 0.7;
  }
  .pill {
    background: #1d3a26;
    padding: 4px 10px;
    border-radius: 12px;
    margin: 0 4px;
  }
  #canvasWrap {
    position: relative;
    line-height: 0;
  }
  #cozyBtn {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.18);
    background: rgba(15, 25, 18, 0.45);
    color: #e8f5e9;
    font-size: 15px;
    line-height: 1;
    cursor: pointer;
    transition: background 0.2s, box-shadow 0.2s, border-color 0.2s;
    padding: 0;
    user-select: none;
  }
  #cozyBtn:hover {
    background: rgba(35, 50, 40, 0.65);
  }
  #cozyBtn.on {
    background: rgba(255, 215, 120, 0.18);
    border-color: rgba(255, 215, 120, 0.55);
    box-shadow: 0 0 10px rgba(255, 215, 120, 0.35);
  }
</style>
</head>
<body>
<div id="wrap">
  <div id="hud">
    <span class="pill">🐵 Lives: <span id="lives">3</span></span>
    <span class="pill">🌳 Trees: <span id="trees">0</span></span>
    <span class="pill">🪓 Loggers: <span id="loggers">0</span></span>
    <span class="pill">🏔 Level: <span id="level">1</span></span>
    <span class="pill"><span id="enemyLabel">🐝 Wasps</span>: <span id="wasps">0</span></span>
    <span class="pill">🍌 Score: <span id="score">0</span></span>
    <span class="pill">⛰ Height: <span id="height">0</span>m</span>
  </div>
  <div id="canvasWrap">
    <canvas id="game" width="900" height="520"></canvas>
    <button id="cozyBtn" title="Vibe (when on: 1-5 = jump level)" aria-label="Vibe">✨</button>
  </div>
  <div id="help">← → move &nbsp;·&nbsp; SPACE/↑/W = jump (glide L2+, FLY L5) &nbsp;·&nbsp; ↓/S = descend (L5) &nbsp;·&nbsp; X = banana &nbsp;·&nbsp; SHIFT = dash (L3) &nbsp;·&nbsp; Q = blink (L4) &nbsp;·&nbsp; T = teleport (L5) &nbsp;·&nbsp; R = restart</div>
</div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const VIEW_W = canvas.width;
  const VIEW_H = canvas.height;
  const WORLD_W = 900;
  let WORLD_H = 4000;
  let GROUND_Y = WORLD_H - 60;
  const WORLD_H_BY_LEVEL = { 1: 4000, 2: 4000, 3: 4000, 4: 4000, 5: 6000 };
  const GRAVITY = 0.6;
  const FRICTION = 0.82;
  const W = WORLD_W;

  let cam = { y: WORLD_H - VIEW_H };
  let bgCache = null;
  let bgCacheLevel = 0;
  let babyMode = false;
  let level = 1;
  let glideEnabled = false;
  let dashEnabled = false;
  let blinkEnabled = false;
  let flightEnabled = false;
  let teleportEnabled = false;
  let godForm = false;
  let levelTransition = 0;
  let levelTransitionMax = 0;
  let levelTransitionNext = 2;

  // Hidden comfort toggle — looks like a vibe button
  const cozyBtn = document.getElementById('cozyBtn');
  cozyBtn.addEventListener('click', () => {
    babyMode = !babyMode;
    cozyBtn.classList.toggle('on', babyMode);
  });

  // ---------- Input ----------
  const keys = {};
  const JUMP_BUFFER_FRAMES = 8;
  const COYOTE_FRAMES = 8;
  window.addEventListener('keydown', e => {
    const k = e.key.toLowerCase();
    if (!e.repeat && (k === ' ' || k === 'arrowup' || k === 'w')) {
      if (player) player.jumpBuffer = JUMP_BUFFER_FRAMES;
    }
    if (!e.repeat && k === 'shift' && dashEnabled && player && !gameOver) {
      if (player.dashCd <= 0 && player.dashing <= 0) {
        player.dashing = 12;
        player.dashCd = 60;
        player.vx = 11 * player.facing;
        player.invuln = Math.max(player.invuln, 28);
      }
    }
    if (!e.repeat && k === 't' && teleportEnabled && player && !gameOver) {
      if (player.teleportCd <= 0) {
        const teleDist = 240;
        const startCx = player.x + player.w/2, startCy = player.y + player.h/2;
        // Mega-burst at origin
        for (let i = 0; i < 30; i++) {
          const a = (i / 30) * Math.PI * 2;
          particles.push({
            x: startCx, y: startCy,
            vx: Math.cos(a) * 5, vy: Math.sin(a) * 5,
            life: 32, color: 'rgba(255, 220, 60, 0.9)', size: 5, g: 0
          });
        }
        player.x = Math.max(0, Math.min(WORLD_W - player.w, player.x + player.facing * teleDist));
        const endCx = player.x + player.w/2, endCy = player.y + player.h/2;
        // Mega-burst at destination
        for (let i = 0; i < 36; i++) {
          const a = (i / 36) * Math.PI * 2;
          particles.push({
            x: endCx, y: endCy,
            vx: Math.cos(a) * 4, vy: Math.sin(a) * 4,
            life: 36, color: 'rgba(255, 240, 120, 0.95)', size: 5, g: 0
          });
        }
        // Lightning streak between start and end
        const steps = 14;
        for (let i = 0; i < steps; i++) {
          const t = i / steps;
          particles.push({
            x: startCx + (endCx - startCx) * t + (Math.random()-0.5)*8,
            y: startCy + (endCy - startCy) * t + (Math.random()-0.5)*8,
            vx: 0, vy: 0,
            life: 22, color: 'rgba(255, 255, 200, 0.85)', size: 6, g: 0
          });
        }
        player.teleportCd = 45;
        player.teleportFlash = 18;
        player.invuln = Math.max(player.invuln, 30);
      }
    }
    if (!e.repeat && k === 'q' && blinkEnabled && player && !gameOver) {
      if (player.blinkCd <= 0) {
        const blinkDist = 95;
        const startCx = player.x + player.w/2, startCy = player.y + player.h/2;
        // Pre-blink shadow burst at origin
        for (let i = 0; i < 18; i++) {
          const a = (i / 18) * Math.PI * 2;
          particles.push({
            x: startCx, y: startCy,
            vx: Math.cos(a) * 3, vy: Math.sin(a) * 3,
            life: 24, color: 'rgba(170, 110, 255, 0.85)', size: 4, g: 0
          });
        }
        // Teleport
        player.x = Math.max(0, Math.min(WORLD_W - player.w, player.x + player.facing * blinkDist));
        // Post-blink emergence burst
        const endCx = player.x + player.w/2, endCy = player.y + player.h/2;
        for (let i = 0; i < 22; i++) {
          const a = (i / 22) * Math.PI * 2;
          particles.push({
            x: endCx, y: endCy,
            vx: Math.cos(a) * 2.5, vy: Math.sin(a) * 2.5,
            life: 28, color: 'rgba(220, 180, 255, 0.9)', size: 4, g: 0
          });
        }
        // Streak between start and end
        const steps = 8;
        for (let i = 0; i < steps; i++) {
          const t = i / steps;
          particles.push({
            x: startCx + (endCx - startCx) * t,
            y: startCy + (endCy - startCy) * t,
            vx: 0, vy: 0,
            life: 16, color: 'rgba(200, 150, 255, 0.7)', size: 5, g: 0
          });
        }
        player.blinkCd = 90;
        player.blinkFlash = 14;
        player.invuln = Math.max(player.invuln, 25);
      }
    }
    keys[k] = true;
    if ([' ', 'arrowup', 'arrowleft', 'arrowright', 'arrowdown'].includes(k)) e.preventDefault();
    if (k === 'r') resetGame(1);
    // Cozy mode (✨) unlocks number-key level jumping
    if (babyMode && !e.repeat && ['1','2','3','4','5'].includes(k)) {
      resetGame(parseInt(k, 10));
    }
  });
  window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });
  canvas.addEventListener('mousedown', () => throwBanana());

  // ---------- Entities ----------
  let player, platforms, trees, loggers, wasps, bananas, axes, particles, pickups, goal;
  let message, gameOver, win, score, maxHeight;

  function buildL5Platforms() {
    // L5 world is 6000 tall — sparse platforms throughout (flight makes them decorative)
    const arr = [{ x: 0, y: GROUND_Y, w: WORLD_W, h: 60 }];
    // Lower section: extra ~2000px of climb (from y=5800 down to y=3900)
    const tiers = [
      [120, 5800], [420, 5720], [720, 5800],
      [240, 5620], [540, 5540], [780, 5620],
      [80,  5440], [360, 5360], [620, 5440],
      [200, 5260], [480, 5180], [740, 5260],
      [100, 5080], [380, 5000], [640, 5080],
      [240, 4880], [520, 4800], [760, 4880],
      [80,  4680], [360, 4600], [620, 4680],
      [200, 4500], [480, 4420], [740, 4500],
      [100, 4320], [380, 4240], [640, 4320],
      [240, 4140], [520, 4060], [760, 4140],
      [80,  3960], [360, 3880], [620, 3960],
    ];
    for (const [x, y] of tiers) arr.push({ x, y, w: 140, h: 14 });
    // Mid-lower tiers (existing 3800–2400 layout pattern, just continues climbing)
    const midTiers = [
      [120, 3800], [420, 3720], [720, 3800],
      [240, 3620], [540, 3540], [780, 3620],
      [80,  3440], [360, 3360], [620, 3440],
      [200, 3260], [480, 3180], [740, 3260],
      [100, 3080], [380, 3000], [640, 3080],
      [240, 2880], [520, 2800], [760, 2880],
      [80,  2680], [360, 2600], [620, 2680],
      [200, 2500],
    ];
    for (const [x, y] of midTiers) arr.push({ x, y, w: 140, h: 14 });
    // Upper section (existing climb, unchanged from L1-L4)
    const upper = [
      [120, 2400], [400, 2320], [660, 2400],
      [240, 2200], [520, 2120], [760, 2200],
      [80,  2000], [360, 1920], [620, 2000],
      [200, 1800], [480, 1720], [740, 1800],
      [100, 1600], [380, 1520], [640, 1600],
      [240, 1400], [520, 1320], [760, 1400],
      [80,  1200], [360, 1120], [620, 1200],
      [200, 1000], [480, 920],  [740, 1000],
      [100, 800],  [380, 720],  [640, 800],
      [240, 600],  [520, 520],
      [360, 380],
    ];
    for (const [x, y] of upper) arr.push({ x, y, w: 140, h: 14 });
    // Top sanctuary
    arr.push({ x: 280, y: 200, w: 340, h: 18 });
    return arr;
  }

  function resetGame(newLevel) {
    if (newLevel != null && newLevel !== level) {
      level = newLevel;
      bgCache = null;
    }
    // Per-level world height — L5 is taller for the godly climb
    WORLD_H = WORLD_H_BY_LEVEL[level] || 4000;
    GROUND_Y = WORLD_H - 60;
    glideEnabled = level >= 2;
    dashEnabled = level >= 3;
    blinkEnabled = level >= 4;
    flightEnabled = level >= 5;
    teleportEnabled = level >= 5;
    godForm = level >= 5;
    levelTransition = 0;
    levelTransitionNext = level + 1;

    player = {
      x: 80, y: GROUND_Y - 60, w: 38, h: 46,
      vx: 0, vy: 0,
      onGround: false, facing: 1,
      lives: 10, invuln: 0,
      anim: 0, throwCd: 0,
      jumpBuffer: 0, coyoteT: 0, airJumpsLeft: 1,
      gliding: false, dashing: 0, dashCd: 0,
      blinkCd: 0, blinkFlash: 0,
      teleportCd: 0, teleportFlash: 0
    };
    // Snap camera to the player so level transitions don't visibly scroll across the world
    cam.y = Math.max(0, Math.min(WORLD_H - VIEW_H,
      player.y + player.h/2 - VIEW_H * 0.62));

    platforms = level === 5 ? buildL5Platforms() : [
      // Ground
      { x: 0, y: GROUND_Y, w: WORLD_W, h: 60 },
      // ===== Lower section (new) =====
      { x: 120, y: 3800, w: 140, h: 14 },
      { x: 420, y: 3720, w: 140, h: 14 },
      { x: 720, y: 3800, w: 140, h: 14 },
      { x: 240, y: 3620, w: 130, h: 14 },
      { x: 540, y: 3540, w: 140, h: 14 },
      { x: 780, y: 3620, w: 120, h: 14 },
      { x: 80,  y: 3440, w: 130, h: 14 },
      { x: 360, y: 3360, w: 140, h: 14 },
      { x: 620, y: 3440, w: 140, h: 14 },
      { x: 200, y: 3260, w: 130, h: 14 },
      { x: 480, y: 3180, w: 150, h: 14 },
      { x: 740, y: 3260, w: 130, h: 14 },
      { x: 100, y: 3080, w: 130, h: 14 },
      { x: 380, y: 3000, w: 140, h: 14 },
      { x: 640, y: 3080, w: 140, h: 14 },
      { x: 240, y: 2880, w: 140, h: 14 },
      { x: 520, y: 2800, w: 140, h: 14 },
      { x: 760, y: 2880, w: 120, h: 14 },
      { x: 80,  y: 2680, w: 140, h: 14 },
      { x: 360, y: 2600, w: 140, h: 14 },
      { x: 620, y: 2680, w: 140, h: 14 },
      { x: 200, y: 2500, w: 140, h: 14 },
      // ===== Upper section (existing) =====
      // Tier 1
      { x: 120, y: 2400, w: 140, h: 14 },
      { x: 400, y: 2320, w: 140, h: 14 },
      { x: 660, y: 2400, w: 140, h: 14 },
      // Tier 2
      { x: 240, y: 2200, w: 130, h: 14 },
      { x: 520, y: 2120, w: 140, h: 14 },
      { x: 760, y: 2200, w: 120, h: 14 },
      // Tier 3
      { x: 80,  y: 2000, w: 130, h: 14 },
      { x: 360, y: 1920, w: 140, h: 14 },
      { x: 620, y: 2000, w: 140, h: 14 },
      // Tier 4
      { x: 200, y: 1800, w: 130, h: 14 },
      { x: 480, y: 1720, w: 150, h: 14 },
      { x: 740, y: 1800, w: 130, h: 14 },
      // Tier 5
      { x: 100, y: 1600, w: 130, h: 14 },
      { x: 380, y: 1520, w: 140, h: 14 },
      { x: 640, y: 1600, w: 140, h: 14 },
      // Tier 6
      { x: 240, y: 1400, w: 140, h: 14 },
      { x: 520, y: 1320, w: 140, h: 14 },
      { x: 760, y: 1400, w: 120, h: 14 },
      // Tier 7
      { x: 80,  y: 1200, w: 140, h: 14 },
      { x: 360, y: 1120, w: 140, h: 14 },
      { x: 620, y: 1200, w: 140, h: 14 },
      // Tier 8
      { x: 200, y: 1000, w: 140, h: 14 },
      { x: 480, y: 920,  w: 150, h: 14 },
      { x: 740, y: 1000, w: 130, h: 14 },
      // Tier 9
      { x: 100, y: 800,  w: 140, h: 14 },
      { x: 380, y: 720,  w: 140, h: 14 },
      { x: 640, y: 800,  w: 140, h: 14 },
      // Tier 10
      { x: 240, y: 600,  w: 140, h: 14 },
      { x: 520, y: 520,  w: 140, h: 14 },
      // Tier 11
      { x: 360, y: 380,  w: 180, h: 14 },
      // Top sanctuary
      { x: 280, y: 200,  w: 340, h: 18 },
    ];

    trees = [];
    const treeXs = [120, 280, 460, 640, 800];
    treeXs.forEach(x => {
      trees.push({ x, y: GROUND_Y, w: 28, h: 110, hp: 200, alive: true, sway: Math.random() * Math.PI * 2 });
    });

    loggers = [];
    if (level === 1) {
      spawnLogger(220, 1);
      spawnLogger(450, -1);
      spawnLogger(560, 1);
      spawnLogger(780, -1);
    } else if (level === 2) {
      // Mountain peak — fewer, hardier loggers ("ice hunters")
      spawnLogger(300, 1);
      spawnLogger(620, -1);
    }
    // Level 3 — no loggers, just lava bats threat the climb
    // Level 4 — no loggers, just phasing wisps
    // Level 5 — no loggers, you are GOD

    // Flying enemies — wasps on level 1, hawks on level 2 (different behavior + look)
    if (level === 1) {
      wasps = [
        { cx: 420, cy: 3700, range: 110, alive: true, hp: 1, t: 0.0, w: 30, h: 22, type: 'wasp' },
        { cx: 600, cy: 3500, range: 120, alive: true, hp: 1, t: 1.0, w: 30, h: 22, type: 'wasp' },
        { cx: 280, cy: 3300, range: 130, alive: true, hp: 1, t: 0.5, w: 30, h: 22, type: 'wasp' },
        { cx: 470, cy: 3100, range: 110, alive: true, hp: 1, t: 1.7, w: 30, h: 22, type: 'wasp' },
        { cx: 670, cy: 2900, range: 130, alive: true, hp: 1, t: 0.3, w: 30, h: 22, type: 'wasp' },
        { cx: 260, cy: 2700, range: 130, alive: true, hp: 1, t: 1.4, w: 30, h: 22, type: 'wasp' },
        { cx: 500, cy: 2500, range: 130, alive: true, hp: 1, t: 0.8, w: 30, h: 22, type: 'wasp' },
        { cx: 420, cy: 2260, range: 110, alive: true, hp: 1, t: 0.0, w: 30, h: 22, type: 'wasp' },
        { cx: 600, cy: 2060, range: 120, alive: true, hp: 1, t: 1.0, w: 30, h: 22, type: 'wasp' },
        { cx: 280, cy: 1860, range: 130, alive: true, hp: 1, t: 0.5, w: 30, h: 22, type: 'wasp' },
        { cx: 470, cy: 1660, range: 110, alive: true, hp: 1, t: 1.7, w: 30, h: 22, type: 'wasp' },
        { cx: 670, cy: 1460, range: 130, alive: true, hp: 1, t: 0.3, w: 30, h: 22, type: 'wasp' },
        { cx: 260, cy: 1260, range: 130, alive: true, hp: 1, t: 1.4, w: 30, h: 22, type: 'wasp' },
        { cx: 500, cy: 1060, range: 130, alive: true, hp: 1, t: 0.8, w: 30, h: 22, type: 'wasp' },
        { cx: 700, cy: 860,  range: 130, alive: true, hp: 1, t: 2.0, w: 30, h: 22, type: 'wasp' },
        { cx: 360, cy: 660,  range: 140, alive: true, hp: 1, t: 1.1, w: 30, h: 22, type: 'wasp' },
        { cx: 450, cy: 280,  range: 220, alive: true, hp: 3, t: 0.0, w: 42, h: 30, type: 'wasp', boss: true },
      ];
    } else if (level === 2) {
      // Level 2: hawks — fewer in number but tougher and they SWOOP
      wasps = [
        { cx: 420, cy: 3700, range: 180, alive: true, hp: 2, t: 0.0, w: 42, h: 30, type: 'hawk', swoopT: 0 },
        { cx: 300, cy: 3300, range: 200, alive: true, hp: 2, t: 0.5, w: 42, h: 30, type: 'hawk', swoopT: 0 },
        { cx: 600, cy: 2900, range: 180, alive: true, hp: 2, t: 1.0, w: 42, h: 30, type: 'hawk', swoopT: 0 },
        { cx: 350, cy: 2500, range: 200, alive: true, hp: 2, t: 1.5, w: 42, h: 30, type: 'hawk', swoopT: 0 },
        { cx: 550, cy: 2100, range: 190, alive: true, hp: 2, t: 0.3, w: 42, h: 30, type: 'hawk', swoopT: 0 },
        { cx: 300, cy: 1700, range: 200, alive: true, hp: 2, t: 1.8, w: 42, h: 30, type: 'hawk', swoopT: 0 },
        { cx: 600, cy: 1300, range: 190, alive: true, hp: 2, t: 0.8, w: 42, h: 30, type: 'hawk', swoopT: 0 },
        { cx: 350, cy: 900,  range: 200, alive: true, hp: 2, t: 2.2, w: 42, h: 30, type: 'hawk', swoopT: 0 },
        { cx: 500, cy: 550,  range: 180, alive: true, hp: 2, t: 1.1, w: 42, h: 30, type: 'hawk', swoopT: 0 },
        { cx: 450, cy: 280, range: 260, alive: true, hp: 5, t: 0.0, w: 60, h: 42, type: 'hawk', swoopT: 0, boss: true },
      ];
    } else if (level === 3) {
      // Level 3: lava bats — fast, erratic, plentiful
      wasps = [
        { cx: 380, cy: 3700, range: 150, alive: true, hp: 2, t: 0.0, w: 28, h: 20, type: 'bat' },
        { cx: 620, cy: 3550, range: 160, alive: true, hp: 2, t: 0.7, w: 28, h: 20, type: 'bat' },
        { cx: 250, cy: 3400, range: 140, alive: true, hp: 2, t: 1.4, w: 28, h: 20, type: 'bat' },
        { cx: 500, cy: 3200, range: 160, alive: true, hp: 2, t: 0.3, w: 28, h: 20, type: 'bat' },
        { cx: 320, cy: 3000, range: 150, alive: true, hp: 2, t: 1.8, w: 28, h: 20, type: 'bat' },
        { cx: 600, cy: 2800, range: 160, alive: true, hp: 2, t: 0.9, w: 28, h: 20, type: 'bat' },
        { cx: 270, cy: 2600, range: 150, alive: true, hp: 2, t: 2.1, w: 28, h: 20, type: 'bat' },
        { cx: 480, cy: 2400, range: 160, alive: true, hp: 2, t: 0.4, w: 28, h: 20, type: 'bat' },
        { cx: 350, cy: 2150, range: 150, alive: true, hp: 2, t: 1.5, w: 28, h: 20, type: 'bat' },
        { cx: 620, cy: 1900, range: 160, alive: true, hp: 2, t: 0.6, w: 28, h: 20, type: 'bat' },
        { cx: 250, cy: 1650, range: 150, alive: true, hp: 2, t: 1.9, w: 28, h: 20, type: 'bat' },
        { cx: 520, cy: 1400, range: 160, alive: true, hp: 2, t: 0.8, w: 28, h: 20, type: 'bat' },
        { cx: 350, cy: 1150, range: 150, alive: true, hp: 2, t: 1.3, w: 28, h: 20, type: 'bat' },
        { cx: 600, cy: 900,  range: 160, alive: true, hp: 2, t: 2.0, w: 28, h: 20, type: 'bat' },
        { cx: 400, cy: 600,  range: 150, alive: true, hp: 2, t: 1.0, w: 28, h: 20, type: 'bat' },
        // Boss bat — guards the volcano exit
        { cx: 450, cy: 280, range: 260, alive: true, hp: 6, t: 0.0, w: 50, h: 36, type: 'bat', boss: true },
      ];
    } else if (level === 4) {
      // Level 4: will-o-wisps — phase in/out, only damageable & dangerous when solid
      const W4 = (cx, cy, range, hp, t, w, h, phaseOffset, extra = {}) =>
        ({ cx, cy, range, alive: true, hp, t, w, h, type: 'wisp', phaseT: phaseOffset, phased: false, ...extra });
      wasps = [
        W4(400, 3700, 140, 1, 0.0, 28, 28, 0),
        W4(620, 3500, 150, 1, 0.7, 28, 28, 60),
        W4(270, 3300, 140, 1, 1.4, 28, 28, 120),
        W4(500, 3100, 150, 1, 0.3, 28, 28, 40),
        W4(330, 2900, 140, 1, 1.8, 28, 28, 100),
        W4(600, 2700, 150, 1, 0.9, 28, 28, 20),
        W4(280, 2500, 140, 1, 2.1, 28, 28, 80),
        W4(490, 2300, 150, 1, 0.4, 28, 28, 140),
        W4(360, 2050, 140, 1, 1.5, 28, 28, 70),
        W4(620, 1850, 150, 1, 0.6, 28, 28, 30),
        W4(250, 1650, 140, 1, 1.9, 28, 28, 110),
        W4(520, 1450, 150, 1, 0.8, 28, 28, 50),
        W4(350, 1250, 140, 1, 1.3, 28, 28, 90),
        W4(600, 1050, 150, 1, 2.0, 28, 28, 10),
        W4(400, 850,  140, 1, 1.0, 28, 28, 130),
        W4(280, 600,  140, 1, 0.5, 28, 28, 60),
        // Boss wisp — guardian of the realm
        W4(450, 280, 260, 4, 0.0, 56, 56, 0, { boss: true }),
      ];
    } else {
      // Level 5: DIVINE-BUFFED VERSIONS of every enemy from previous levels
      // Each carries `divine: true` for the golden halo render treatment
      const D = (extra) => ({ alive: true, divine: true, ...extra });
      const initPos = (e) => { e.x = e.cx - e.w/2; e.y = e.cy - e.h/2; return e; };
      wasps = [
        // ===== Divine Wasps (L1 buffed: 3hp, bigger) =====
        initPos(D({ cx: 420, cy: 5800, range: 130, hp: 3, t: 0.0, w: 38, h: 28, type: 'wasp' })),
        initPos(D({ cx: 600, cy: 5400, range: 140, hp: 3, t: 1.0, w: 38, h: 28, type: 'wasp' })),
        initPos(D({ cx: 280, cy: 5000, range: 140, hp: 3, t: 0.5, w: 38, h: 28, type: 'wasp' })),
        initPos(D({ cx: 500, cy: 4400, range: 140, hp: 3, t: 1.5, w: 38, h: 28, type: 'wasp' })),
        // ===== Divine Hawks (L2 buffed: 4hp, swooping) =====
        initPos(D({ cx: 380, cy: 5600, range: 200, hp: 4, t: 0.0, w: 50, h: 36, type: 'hawk', swoopT: 0 })),
        initPos(D({ cx: 620, cy: 5100, range: 200, hp: 4, t: 0.7, w: 50, h: 36, type: 'hawk', swoopT: 0 })),
        initPos(D({ cx: 350, cy: 4700, range: 200, hp: 4, t: 1.4, w: 50, h: 36, type: 'hawk', swoopT: 0 })),
        initPos(D({ cx: 550, cy: 4100, range: 200, hp: 4, t: 0.5, w: 50, h: 36, type: 'hawk', swoopT: 0 })),
        // ===== Divine Bats (L3 buffed: 3hp, erratic, paired) =====
        initPos(D({ cx: 320, cy: 4900, range: 170, hp: 3, t: 0.0, w: 34, h: 24, type: 'bat' })),
        initPos(D({ cx: 620, cy: 4800, range: 170, hp: 3, t: 0.7, w: 34, h: 24, type: 'bat' })),
        initPos(D({ cx: 270, cy: 3900, range: 170, hp: 3, t: 1.4, w: 34, h: 24, type: 'bat' })),
        initPos(D({ cx: 560, cy: 3800, range: 170, hp: 3, t: 0.3, w: 34, h: 24, type: 'bat' })),
        // ===== Divine Wisps (L4 buffed: 2hp, phasing, longer solid phase) =====
        initPos(D({ cx: 400, cy: 3500, range: 150, hp: 2, t: 0.0, w: 34, h: 34, type: 'wisp', phaseT: 0, phased: false })),
        initPos(D({ cx: 580, cy: 3200, range: 150, hp: 2, t: 0.6, w: 34, h: 34, type: 'wisp', phaseT: 40, phased: false })),
        initPos(D({ cx: 280, cy: 2900, range: 150, hp: 2, t: 1.2, w: 34, h: 34, type: 'wisp', phaseT: 80, phased: false })),
        initPos(D({ cx: 500, cy: 2600, range: 150, hp: 2, t: 0.8, w: 34, h: 34, type: 'wisp', phaseT: 120, phased: false })),
        // ===== Celestial Wardens (current L5 enemy, kept) =====
        initPos(D({ cx: 380, cy: 2300, range: 180, hp: 3, t: 0.0, w: 40, h: 40, type: 'warden' })),
        initPos(D({ cx: 600, cy: 2000, range: 180, hp: 3, t: 0.7, w: 40, h: 40, type: 'warden' })),
        initPos(D({ cx: 280, cy: 1700, range: 180, hp: 3, t: 1.4, w: 40, h: 40, type: 'warden' })),
        initPos(D({ cx: 500, cy: 1400, range: 180, hp: 3, t: 0.5, w: 40, h: 40, type: 'warden' })),
        initPos(D({ cx: 380, cy: 1100, range: 180, hp: 3, t: 1.2, w: 40, h: 40, type: 'warden' })),
        initPos(D({ cx: 600, cy: 800,  range: 180, hp: 3, t: 0.3, w: 40, h: 40, type: 'warden' })),
        initPos(D({ cx: 320, cy: 600,  range: 180, hp: 3, t: 1.8, w: 40, h: 40, type: 'warden' })),
        // ===== ARCHON FINAL BOSS — the Supreme Warden =====
        initPos({ cx: 450, cy: 280, range: 300, alive: true, divine: true, hp: 15, t: 0.0, w: 90, h: 100, type: 'warden', boss: true }),
      ];
    }

    // Banana collectibles on the climb
    pickups = [
      // Lower section (new)
      { x: 175, y: 3780, taken: false },
      { x: 465, y: 3700, taken: false },
      { x: 770, y: 3780, taken: false },
      { x: 290, y: 3600, taken: false },
      { x: 580, y: 3520, taken: false },
      { x: 125, y: 3420, taken: false },
      { x: 425, y: 3340, taken: false },
      { x: 685, y: 3420, taken: false },
      { x: 250, y: 3240, taken: false },
      { x: 540, y: 3160, taken: false },
      { x: 145, y: 3060, taken: false },
      { x: 430, y: 2980, taken: false },
      { x: 290, y: 2860, taken: false },
      { x: 570, y: 2780, taken: false },
      { x: 125, y: 2660, taken: false },
      { x: 410, y: 2580, taken: false },
      { x: 250, y: 2480, taken: false },
      // Upper section (existing)
      { x: 175, y: 2380, taken: false },
      { x: 465, y: 2300, taken: false },
      { x: 580, y: 2100, taken: false },
      { x: 145, y: 1980, taken: false },
      { x: 425, y: 1900, taken: false },
      { x: 540, y: 1700, taken: false },
      { x: 165, y: 1580, taken: false },
      { x: 700, y: 1380, taken: false },
      { x: 425, y: 1100, taken: false },
      { x: 545, y: 900,  taken: false },
      { x: 445, y: 700,  taken: false },
      { x: 305, y: 580,  taken: false },
    ];

    // Golden banana at the top — touching it = victory
    goal = { x: 430, y: 150, w: 40, h: 50, t: 0, taken: false };

    // Ensure every wasp/enemy has a valid x,y on spawn so render never sees NaN
    // (update normally sets these each frame, but on the level-transition frame
    // render runs before update for the new level)
    for (const w of wasps) {
      if (w.x == null) w.x = w.cx - w.w/2;
      if (w.y == null) w.y = w.cy - w.h/2;
    }

    bananas = [];
    axes = [];
    particles = [];
    message = null;
    gameOver = false;
    win = false;
    score = 0;
    maxHeight = 0;
    updateHud();
  }

  function spawnLogger(x, dir) {
    loggers.push({
      x, y: GROUND_Y - 56, w: 34, h: 56,
      vx: 0.5 * dir, facing: dir,
      hp: 3, alive: true,
      target: null, chopT: 0, anim: 0, stun: 0,
      axeT: 90 + Math.floor(Math.random() * 120)
    });
  }

  function throwBanana() {
    if (gameOver || !player || player.throwCd > 0) return;
    bananas.push({
      x: player.x + player.w / 2,
      y: player.y + 14,
      vx: (babyMode ? 13 : 10) * player.facing,
      vy: -1,
      r: 6, life: babyMode ? 130 : 90,
      dmg: babyMode ? 9 : 1
    });
    player.throwCd = babyMode ? 4 : 10;
  }

  // ---------- Update ----------
  function update() {
    // Level transition pause
    if (levelTransition > 0) {
      levelTransition--;
      if (levelTransition === 0) {
        const savedScore = score;
        resetGame(levelTransitionNext);
        score = savedScore;
        updateHud();
      }
      return;
    }
    if (gameOver) return;

    // Input timers
    if (player.jumpBuffer > 0) player.jumpBuffer--;
    if (player.coyoteT > 0) player.coyoteT--;
    if (player.dashCd > 0) player.dashCd--;
    if (player.blinkCd > 0) player.blinkCd--;
    if (player.blinkFlash > 0) player.blinkFlash--;
    if (player.teleportCd > 0) player.teleportCd--;
    if (player.teleportFlash > 0) player.teleportFlash--;

    // Player input
    const left = keys['arrowleft'] || keys['a'];
    const right = keys['arrowright'] || keys['d'];
    const throwBtn = keys['x'];

    if (left)  { player.vx -= flightEnabled ? 1.0 : 0.7; player.facing = -1; }
    if (right) { player.vx += flightEnabled ? 1.0 : 0.7; player.facing = 1; }
    if (throwBtn) throwBanana();

    player.vx *= flightEnabled ? 0.88 : FRICTION;
    if (flightEnabled) {
      // Free flight — vertical control, no gravity
      const flyUp = keys[' '] || keys['arrowup'] || keys['w'];
      const flyDown = keys['arrowdown'] || keys['s'];
      if (flyUp)   player.vy -= 1.1;
      if (flyDown) player.vy += 1.1;
      player.vy *= 0.88;
      if (Math.abs(player.vy) > 9) player.vy = 9 * Math.sign(player.vy);
    } else {
      player.vy += GRAVITY;
    }
    const maxVx = flightEnabled ? 9 : 6;
    if (Math.abs(player.vx) > maxVx) player.vx = maxVx * Math.sign(player.vx);

    // Dash (level 3 ability) — overrides velocity + suppresses gravity briefly
    if (player.dashing > 0) {
      player.dashing--;
      player.vx = 11 * player.facing;
      player.vy = 0;
      player.invuln = Math.max(player.invuln, 5);
      for (let i = 0; i < 2; i++) {
        particles.push({
          x: player.x + player.w/2 - player.facing * (Math.random() * 14),
          y: player.y + player.h/2 + (Math.random() - 0.5) * 18,
          vx: -player.facing * (1.5 + Math.random() * 1.5),
          vy: (Math.random() - 0.5) * 1.5,
          life: 18,
          color: ['#ff5722', '#ff8f00', '#ffeb3b'][Math.floor(Math.random() * 3)],
          size: 3, g: 0.02
        });
      }
    }

    // Glide (level 2 ability) — hold jump while falling to slow descent
    const jumpHeld = keys[' '] || keys['arrowup'] || keys['w'];
    if (glideEnabled && !player.onGround && player.vy > 0.5 && jumpHeld) {
      player.vy = Math.min(player.vy, babyMode ? 1.2 : 1.8);
      player.gliding = true;
      // Trailing wind puffs — bigger and more frequent so they actually pop
      if (Math.random() < 0.8) {
        particles.push({
          x: player.x + player.w/2 + (Math.random()-0.5)*44,
          y: player.y + player.h + Math.random() * 6,
          vx: (Math.random()-0.5)*2, vy: 1.4 + Math.random()*1.4,
          life: 26, color: 'rgba(230,245,255,0.85)', size: 4, g: 0
        });
      }
      // Occasional cyan sparkle for emphasis
      if (Math.random() < 0.25) {
        particles.push({
          x: player.x + player.w/2 + (Math.random()-0.5)*30,
          y: player.y + player.h/2 + (Math.random()-0.5)*10,
          vx: -player.facing * (1 + Math.random()*2), vy: (Math.random()-0.5)*0.6,
          life: 18, color: 'rgba(160,220,255,0.9)', size: 3, g: 0
        });
      }
    } else {
      player.gliding = false;
    }

    // Jump — consume buffered press with coyote / double-jump (no jump on L5 — flight instead)
    if (!flightEnabled && player.jumpBuffer > 0) {
      if (player.onGround || player.coyoteT > 0) {
        player.vy = babyMode ? -13.5 : -12.5;
        player.onGround = false;
        player.coyoteT = 0;
        player.jumpBuffer = 0;
      } else if (player.airJumpsLeft > 0) {
        player.vy = babyMode ? -13 : -10.8;
        player.airJumpsLeft--;
        player.jumpBuffer = 0;
        spawnAirJumpRing(player.x + player.w/2, player.y + player.h);
      }
    }

    moveAndCollide(player);

    if (player.onGround) {
      player.airJumpsLeft = 1;
      player.coyoteT = babyMode ? 20 : COYOTE_FRAMES;
    }

    if (player.x < 0) player.x = 0;
    if (player.x + player.w > WORLD_W) player.x = WORLD_W - player.w;
    if (player.y > WORLD_H) hurtPlayer(3);

    player.anim += Math.abs(player.vx) * 0.15 + 0.05;
    if (player.invuln > 0) player.invuln--;
    if (player.throwCd > 0) player.throwCd--;

    // Track height climbed (meters = pixels above ground / 10)
    const h = Math.max(0, Math.floor((GROUND_Y - (player.y + player.h)) / 10));
    if (h > maxHeight) maxHeight = h;

    // Camera follows player vertically with a slight lead upward
    const targetCamY = player.y + player.h/2 - VIEW_H * 0.62;
    cam.y += (targetCamY - cam.y) * 0.12;
    cam.y = Math.max(0, Math.min(WORLD_H - VIEW_H, cam.y));

    // Pickups
    for (const p of pickups) {
      if (p.taken) continue;
      if (player.x < p.x + 14 && player.x + player.w > p.x - 14 &&
          player.y < p.y + 14 && player.y + player.h > p.y - 14) {
        p.taken = true;
        score += 25;
        spawnPoof(p.x, p.y);
      }
    }

    // Goal (golden banana at top)
    goal.t += 0.06;
    if (!goal.taken && player.x < goal.x + goal.w && player.x + player.w > goal.x &&
        player.y < goal.y + goal.h && player.y + player.h > goal.y) {
      goal.taken = true;
      score += 500;
      if (level === 1) {
        message = "Climbing to the peak...";
        win = true;
        levelTransition = 210;
        levelTransitionMax = 210;
        levelTransitionNext = 2;
      } else if (level === 2) {
        message = "Descending into the volcano...";
        win = true;
        levelTransition = 210;
        levelTransitionMax = 210;
        levelTransitionNext = 3;
      } else if (level === 3) {
        message = "Wandering into the twilight...";
        win = true;
        levelTransition = 210;
        levelTransitionMax = 210;
        levelTransitionNext = 4;
      } else if (level === 4) {
        message = "ASCENDING to godhood...";
        win = true;
        levelTransition = 240;
        levelTransitionMax = 240;
        levelTransitionNext = 5;
      } else {
        gameOver = true;
        win = true;
        message = "VENGEANCE COMPLETE. You are the JUNGLE GOD. ⚡🐵👑⚡";
      }
    }

    // Loggers
    for (const l of loggers) {
      if (!l.alive) continue;
      if (l.stun > 0) { l.stun--; continue; }

      // Find nearest live tree
      let nearest = null, nd = Infinity;
      for (const t of trees) {
        if (!t.alive) continue;
        const d = Math.abs((t.x + t.w/2) - (l.x + l.w/2));
        if (d < nd) { nd = d; nearest = t; }
      }
      l.target = nearest;

      if (nearest) {
        const dx = (nearest.x + nearest.w/2) - (l.x + l.w/2);
        if (Math.abs(dx) > 6) {
          l.vx = 0.7 * Math.sign(dx);
          l.facing = Math.sign(dx);
          l.chopT = 0;
        } else {
          l.vx = 0;
          l.chopT++;
          if (l.chopT % (babyMode ? 240 : 45) === 0) {
            nearest.hp -= babyMode ? 1 : 6;
            spawnChip(nearest.x + nearest.w/2, nearest.y - 40);
            if (nearest.hp <= 0) {
              nearest.alive = false;
              spawnLeaves(nearest.x + nearest.w/2, nearest.y - 80);
            }
          }
        }
      } else {
        // No trees left → loggers win
        l.vx = 0;
      }

      l.vy += GRAVITY;
      moveAndCollide(l);
      l.anim += Math.abs(l.vx) * 0.2 + 0.04;

      // Axe throwing — when not mid-chop, aim up at the climbing monkey
      if (l.axeT > 0) l.axeT--;
      const notChopping = !(nearest && Math.abs((nearest.x + nearest.w/2) - (l.x + l.w/2)) <= 6);
      if (l.axeT <= 0 && notChopping) {
        const tx = (player.x + player.w/2) + player.vx * 12;
        const ty = (player.y + player.h/2);
        const dxp = tx - (l.x + l.w/2);
        const dyp = ty - (l.y + 6);
        const dist = Math.hypot(dxp, dyp);
        if (dist > 60 && dist < 900 && dyp < 30) {
          const speed = babyMode ? 4.5 : 6.5;
          axes.push({
            x: l.x + l.w/2,
            y: l.y + 6,
            vx: (dxp / dist) * speed,
            vy: (dyp / dist) * speed - 2.4,
            rot: 0,
            rotV: 0.38 * Math.sign(dxp || 1),
            life: 200
          });
          l.facing = Math.sign(dxp || l.facing);
          l.axeT = (nearest ? 240 : 110) + Math.floor(Math.random() * 60);
        } else {
          l.axeT = 60;
        }
      }

      // Stomp check
      if (rectOverlap(player, l)) {
        if (player.vy > 2 && player.y + player.h - l.y < 18) {
          // Stomp
          l.hp -= 2;
          player.vy = -9;
          spawnPoof(l.x + l.w/2, l.y);
          if (l.hp <= 0) { l.alive = false; score += 50; }
        } else if (player.invuln <= 0) {
          hurtPlayer(1);
        }
      }
    }

    // Flying enemies (wasps or hawks)
    for (const w of wasps) {
      if (!w.alive) continue;
      if (w.type === 'hawk') {
        // Hawk — patrols, then dive-bombs the player
        if (w.swoopT > 0) {
          // Active swoop: rapid pursuit
          const tdx = (player.x + player.w/2) - (w.x + w.w/2);
          const tdy = (player.y + player.h/2) - (w.y + w.h/2);
          const td = Math.max(1, Math.hypot(tdx, tdy));
          const sp = babyMode ? 3.5 : 5.5;
          w.x += (tdx/td) * sp;
          w.y += (tdy/td) * sp;
          w.swoopT--;
          if (w.swoopT === 0) w.swoopT = -150;  // recovery cooldown
        } else if (w.swoopT < 0) {
          // Return to patrol height
          const tx = w.cx + Math.sin(w.t) * w.range - w.w/2;
          const ty = w.cy - w.h/2;
          w.x += (tx - w.x) * 0.06;
          w.y += (ty - w.y) * 0.06;
          w.t += 0.02;
          w.swoopT++;
        } else {
          // Patrol
          w.t += 0.022;
          w.x = w.cx + Math.sin(w.t) * w.range - w.w/2;
          w.y = w.cy + Math.sin(w.t * 1.3) * 14 - w.h/2;
          // Trigger swoop when player is below + close horizontally
          const dxp = Math.abs((player.x + player.w/2) - (w.x + w.w/2));
          const dyp = (player.y + player.h/2) - (w.y + w.h/2);
          const triggerRange = babyMode ? 60 : 140;
          if (dxp < triggerRange && dyp > 40 && dyp < 320) {
            w.swoopT = 28;
          }
        }
      } else if (w.type === 'bat') {
        // Lava bat — erratic darting motion, faster than wasps
        w.t += 0.055;
        w.x = w.cx + Math.sin(w.t) * w.range - w.w/2;
        w.y = w.cy + Math.sin(w.t * 3.5) * 28 + Math.sin(w.t * 7) * 8 - w.h/2;
      } else if (w.type === 'wisp') {
        // Will-o-wisp — drifting, phases in/out so timing matters
        w.t += 0.028;
        w.x = w.cx + Math.sin(w.t) * w.range - w.w/2;
        w.y = w.cy + Math.sin(w.t * 0.7) * 36 + Math.sin(w.t * 2.3) * 6 - w.h/2;
        w.phaseT = (w.phaseT + 1) % 180;
        // Solid for first 110 frames, phased (intangible) for the remaining 70
        w.phased = w.phaseT > 110;
      } else if (w.type === 'warden') {
        // Celestial Warden — slowly homes in on the player like a guardian closing in
        const tdx = (player.x + player.w/2) - (w.x + w.w/2);
        const tdy = (player.y + player.h/2) - (w.y + w.h/2);
        const td = Math.max(1, Math.hypot(tdx, tdy));
        const sp = w.boss ? 1.5 : 1.1;
        w.x += (tdx/td) * sp;
        w.y += (tdy/td) * sp;
        w.t += 0.04;
        w.x += Math.sin(w.t * 2) * 0.4;
        w.y += Math.sin(w.t * 1.7) * 0.3;
      } else {
        // Wasp — gentle patrol
        w.t += 0.035;
        w.x = w.cx + Math.sin(w.t) * w.range - w.w/2;
        w.y = w.cy + Math.sin(w.t * 2.2) * 8 - w.h/2;
      }
      // Damage player on contact (phased wisps don't hurt)
      if (!w.phased && player.invuln <= 0 && rectOverlap(player, w)) {
        hurtPlayer(1);
        spawnPoof(player.x + player.w/2, player.y);
      }
    }

    // Bananas
    for (const b of bananas) {
      b.x += b.vx; b.y += b.vy;
      b.vy += babyMode ? 0.03 : 0.12;
      b.life--;
      if (b.y > GROUND_Y - 4) { b.life = 0; spawnPoof(b.x, b.y); }
      if (b.x < 0 || b.x > WORLD_W) b.life = 0;
      for (const l of loggers) {
        if (!l.alive) continue;
        const pad = babyMode ? 12 : 4;
        if (b.x > l.x - pad && b.x < l.x + l.w + pad && b.y > l.y - pad && b.y < l.y + l.h + pad) {
          l.hp -= (b.dmg || 1);
          l.stun = 45;
          l.vx = 2 * -l.facing;
          b.life = 0;
          score += 10;
          spawnPoof(b.x, b.y);
          if (l.hp <= 0) { l.alive = false; score += 50; }
        }
      }
      if (b.life <= 0) continue;
      for (const w of wasps) {
        if (!w.alive || w.phased) continue;
        const pad = babyMode ? 12 : 4;
        if (b.x > w.x - pad && b.x < w.x + w.w + pad && b.y > w.y - pad && b.y < w.y + w.h + pad) {
          w.hp -= (b.dmg || 1);
          b.life = 0;
          score += 20;
          spawnPoof(b.x, b.y);
          if (w.hp <= 0) {
            w.alive = false;
            score += 40;
            spawnLeaves(w.x + w.w/2, w.y + w.h/2);
          }
          break;
        }
      }
    }
    bananas = bananas.filter(b => b.life > 0);

    // Thrown axes
    for (const a of axes) {
      a.x += a.vx;
      a.y += a.vy;
      a.vy += 0.22;
      a.rot += a.rotV;
      a.life--;
      if (a.y > GROUND_Y - 4) { a.life = 0; spawnChip(a.x, GROUND_Y - 6); }
      if (a.x < -20 || a.x > WORLD_W + 20) a.life = 0;
      // Hit player
      const pad = 6;
      if (a.x > player.x - pad && a.x < player.x + player.w + pad &&
          a.y > player.y - pad && a.y < player.y + player.h + pad) {
        if (player.invuln <= 0) {
          hurtPlayer(1);
          spawnPoof(a.x, a.y);
        }
        a.life = 0;
      }
    }
    axes = axes.filter(a => a.life > 0);

    // Particles
    for (const p of particles) {
      p.x += p.vx; p.y += p.vy;
      p.vy += p.g || 0.2;
      p.life--;
    }
    particles = particles.filter(p => p.life > 0);

    // Trees sway
    for (const t of trees) t.sway += 0.04;

    // Lose if all trees are chopped down
    const aliveTrees = trees.filter(t => t.alive).length;
    if (aliveTrees === 0) { gameOver = true; win = false; message = "The jungle is gone... 🌲💀"; }

    updateHud();
  }

  function hurtPlayer(n) {
    if (player.invuln > 0) return;
    if (babyMode && Math.random() < 0.88) {
      // Quietly absorb most hits without showing damage
      player.invuln = 40;
      return;
    }
    player.lives -= n;
    player.invuln = babyMode ? 140 : 80;
    player.vy = -7;
    player.vx = -3 * player.facing;
    if (player.lives <= 0) {
      player.lives = 0;
      gameOver = true;
      win = false;
      message = "The monkey has fallen... 🐵💔";
    }
  }

  function moveAndCollide(e) {
    const prevBottom = e.y + e.h;
    e.x += e.vx;
    for (const p of platforms) if (rectOverlap(e, p)) {
      // One-way (jump-through) platforms don't block horizontal motion
      if (p.y < GROUND_Y) continue;
      if (e.vx > 0) e.x = p.x - e.w; else if (e.vx < 0) e.x = p.x + p.w;
      e.vx = 0;
    }
    e.y += e.vy;
    e.onGround = false;
    for (const p of platforms) if (rectOverlap(e, p)) {
      const oneWay = p.y < GROUND_Y;
      if (oneWay) {
        // Land only if falling AND we were above the platform top last frame
        if (e.vy >= 0 && prevBottom <= p.y + 0.5) {
          e.y = p.y - e.h; e.vy = 0; e.onGround = true;
        }
      } else {
        if (e.vy > 0) { e.y = p.y - e.h; e.vy = 0; e.onGround = true; }
        else if (e.vy < 0) { e.y = p.y + p.h; e.vy = 0; }
      }
    }
  }

  function rectOverlap(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
  }

  function spawnChip(x, y) {
    for (let i = 0; i < 5; i++) {
      particles.push({
        x, y, vx: (Math.random()-0.5)*3, vy: -Math.random()*3,
        life: 30, color: '#c19a6b', size: 3
      });
    }
  }
  function spawnLeaves(x, y) {
    for (let i = 0; i < 25; i++) {
      particles.push({
        x, y, vx: (Math.random()-0.5)*4, vy: -Math.random()*4 - 1,
        life: 80, color: ['#2e7d32','#4caf50','#81c784'][i%3], size: 4, g: 0.12
      });
    }
  }
  function spawnPoof(x, y) {
    for (let i = 0; i < 6; i++) {
      particles.push({
        x, y, vx: (Math.random()-0.5)*2, vy: -Math.random()*2,
        life: 18, color: '#fff8c4', size: 3
      });
    }
  }
  function spawnAirJumpRing(x, y) {
    for (let i = 0; i < 14; i++) {
      const a = (i / 14) * Math.PI * 2;
      particles.push({
        x, y,
        vx: Math.cos(a) * 3.2,
        vy: Math.sin(a) * 1.6 + 0.5,
        life: 22, color: '#e0f7ff', size: 3, g: 0.05
      });
    }
  }

  // ---------- Drawing ----------
  function buildBackgroundCache() {
    bgCache = document.createElement('canvas');
    bgCache.width = WORLD_W;
    bgCache.height = WORLD_H;
    bgCacheLevel = level;
    if (level === 2) { buildLevel2Background(bgCache.getContext('2d')); return; }
    if (level === 3) { buildLevel3Background(bgCache.getContext('2d')); return; }
    if (level === 4) { buildLevel4Background(bgCache.getContext('2d')); return; }
    if (level === 5) { buildLevel5Background(bgCache.getContext('2d')); return; }
    const b = bgCache.getContext('2d');

    // Atmospheric sky-to-jungle-floor gradient
    const grd = b.createLinearGradient(0, 0, 0, WORLD_H);
    grd.addColorStop(0,    '#3d7fb8');
    grd.addColorStop(0.08, '#5fa3d4');
    grd.addColorStop(0.18, '#8ed3f0');
    grd.addColorStop(0.32, '#b9d8e8');
    grd.addColorStop(0.5,  '#cae3c2');
    grd.addColorStop(0.72, '#86bd6e');
    grd.addColorStop(0.9,  '#3d6a2a');
    grd.addColorStop(1,    '#1f1408');
    b.fillStyle = grd;
    b.fillRect(0, 0, WORLD_W, WORLD_H);

    // Distant mountain range (sky region)
    b.fillStyle = 'rgba(120, 150, 175, 0.55)';
    b.beginPath();
    b.moveTo(-10, 320);
    const peaks = [
      [80,  220], [180, 280], [280, 200], [400, 270],
      [520, 215], [640, 270], [760, 220], [WORLD_W + 10, 260]
    ];
    for (const [x, y] of peaks) b.lineTo(x, y);
    b.lineTo(WORLD_W + 10, 380);
    b.lineTo(-10, 380);
    b.closePath();
    b.fill();
    // Snow caps on tall peaks
    b.fillStyle = 'rgba(255, 255, 255, 0.85)';
    for (const [x, y] of peaks) {
      if (y < 240) {
        b.beginPath();
        b.moveTo(x - 16, y + 14);
        b.lineTo(x, y);
        b.lineTo(x + 16, y + 14);
        b.closePath();
        b.fill();
      }
    }
    // Nearer ridge layer (darker)
    b.fillStyle = 'rgba(80, 110, 90, 0.65)';
    b.beginPath();
    b.moveTo(-10, 420);
    const peaks2 = [
      [120, 360], [260, 390], [400, 350], [540, 390],
      [680, 360], [820, 390], [WORLD_W + 10, 380]
    ];
    for (const [x, y] of peaks2) b.lineTo(x, y);
    b.lineTo(WORLD_W + 10, 450);
    b.lineTo(-10, 450);
    b.closePath();
    b.fill();

    // Atmospheric haze — fades the mountain bases smoothly into the sky behind
    // so they don't look like cardboard cutouts when the camera reaches them
    const hazeG = b.createLinearGradient(0, 280, 0, 470);
    hazeG.addColorStop(0,    'rgba(185, 216, 232, 0)');
    hazeG.addColorStop(0.55, 'rgba(195, 220, 230, 0.6)');
    hazeG.addColorStop(1,    'rgba(201, 228, 208, 0)');
    b.fillStyle = hazeG;
    b.fillRect(0, 280, WORLD_W, 190);

    // Soft cloud bank below the mountains — anchors them visually as if rising above clouds
    for (let i = 0; i < 6; i++) {
      const cx = 60 + i * 150 + ((i * 47) % 60);
      const cy = 400 + (i % 2) * 14;
      b.fillStyle = 'rgba(255, 255, 255, 0.55)';
      b.beginPath();
      b.ellipse(cx, cy, 95, 11, 0, 0, Math.PI*2);
      b.fill();
      b.fillStyle = 'rgba(255, 255, 255, 0.3)';
      b.beginPath();
      b.ellipse(cx + 25, cy + 5, 70, 8, 0, 0, Math.PI*2);
      b.fill();
    }

    // Sun + rays + halo
    const sunX = WORLD_W - 130, sunY = 115;
    b.fillStyle = 'rgba(255,242,168,0.15)';
    b.beginPath(); b.arc(sunX, sunY, 110, 0, Math.PI*2); b.fill();
    b.fillStyle = 'rgba(255,242,168,0.3)';
    b.beginPath(); b.arc(sunX, sunY, 75, 0, Math.PI*2); b.fill();
    b.fillStyle = '#ffe082';
    b.beginPath(); b.arc(sunX, sunY, 46, 0, Math.PI*2); b.fill();
    b.fillStyle = '#fff8d0';
    b.beginPath(); b.arc(sunX, sunY, 32, 0, Math.PI*2); b.fill();
    // Sun rays
    b.strokeStyle = 'rgba(255,238,160,0.5)'; b.lineWidth = 2;
    for (let i = 0; i < 14; i++) {
      const a = (i / 14) * Math.PI * 2;
      b.beginPath();
      b.moveTo(sunX + Math.cos(a) * 52, sunY + Math.sin(a) * 52);
      b.lineTo(sunX + Math.cos(a) * 66, sunY + Math.sin(a) * 66);
      b.stroke();
    }

    // Clouds — layered, soft
    const clouds = [
      [120, 220, 38, 0.85], [620, 320, 32, 0.8], [220, 540, 28, 0.75],
      [720, 660, 36, 0.85], [380, 880, 30, 0.7], [600, 1080, 34, 0.7],
      [180, 1280, 30, 0.65], [700, 1450, 32, 0.65], [350, 1650, 28, 0.55],
      [80, 420, 22, 0.7], [500, 200, 26, 0.85], [800, 470, 24, 0.7],
      [60, 760, 26, 0.7], [430, 1240, 26, 0.7],
    ];
    for (const [cx, cy, cr, op] of clouds) {
      b.fillStyle = `rgba(255,255,255,${op * 0.35})`;
      b.beginPath(); b.arc(cx, cy, cr * 1.5, 0, Math.PI*2); b.fill();
      b.fillStyle = `rgba(255,255,255,${op})`;
      b.beginPath();
      b.arc(cx, cy, cr, 0, Math.PI*2);
      b.arc(cx + cr*0.9, cy + 4, cr*0.7, 0, Math.PI*2);
      b.arc(cx - cr*0.9, cy + 4, cr*0.7, 0, Math.PI*2);
      b.arc(cx + cr*0.3, cy - cr*0.55, cr*0.55, 0, Math.PI*2);
      b.fill();
    }

    // Birds in distance
    b.strokeStyle = 'rgba(40,40,50,0.6)'; b.lineWidth = 1.4;
    const birdGroups = [[300, 380], [340, 395], [320, 405], [500, 720], [520, 730], [690, 1180], [710, 1190]];
    for (const [bx, by] of birdGroups) {
      b.beginPath();
      b.moveTo(bx, by); b.lineTo(bx + 5, by - 3); b.lineTo(bx + 10, by);
      b.stroke();
    }

    // God rays through canopy
    b.save();
    b.globalAlpha = 0.07;
    b.fillStyle = '#fff5c0';
    for (let i = 0; i < 6; i++) {
      const rx = 80 + i * 160;
      b.beginPath();
      b.moveTo(rx, 560);
      b.lineTo(rx - 45, 1300);
      b.lineTo(rx + 45, 1300);
      b.closePath();
      b.fill();
    }
    b.restore();

    // Distant canopy — far layer (lightest)
    b.fillStyle = 'rgba(70, 110, 50, 0.32)';
    for (let i = 0; i < 16; i++) {
      const x = (i * 65 + 20) % WORLD_W;
      const y = GROUND_Y - 70 - (i % 4) * 28;
      b.beginPath(); b.arc(x, y, 34, 0, Math.PI*2); b.fill();
      b.fillRect(x - 4, y, 8, 60);
    }
    // Mid layer
    b.fillStyle = 'rgba(46, 92, 32, 0.55)';
    for (let i = 0; i < 12; i++) {
      const x = (i * 82 + 50) % WORLD_W;
      const y = GROUND_Y - 38 - (i % 3) * 22;
      b.beginPath(); b.arc(x, y, 30, 0, Math.PI*2); b.fill();
      b.fillRect(x - 5, y, 10, 42);
    }
    // Near layer (darkest)
    b.fillStyle = 'rgba(30, 60, 22, 0.78)';
    for (let i = 0; i < 9; i++) {
      const x = (i * 105 + 70) % WORLD_W;
      const y = GROUND_Y - 18;
      b.beginPath(); b.arc(x, y, 28, 0, Math.PI*2); b.fill();
      b.fillRect(x - 5, y, 10, 24);
    }

    // Ground — dirt gradient
    const dirtG = b.createLinearGradient(0, GROUND_Y, 0, WORLD_H);
    dirtG.addColorStop(0, '#7a4a25');
    dirtG.addColorStop(0.4, '#5b3a1e');
    dirtG.addColorStop(1, '#3a2410');
    b.fillStyle = dirtG;
    b.fillRect(0, GROUND_Y, WORLD_W, WORLD_H - GROUND_Y);
    // Pebbles
    b.fillStyle = 'rgba(0,0,0,0.25)';
    for (let i = 0; i < WORLD_W; i += 14) {
      const dy = GROUND_Y + 10 + ((i * 7) % 28);
      b.beginPath(); b.arc(i + ((i * 3) % 7), dy, 1.4, 0, Math.PI*2); b.fill();
    }
    // Grass strip
    const grassG = b.createLinearGradient(0, GROUND_Y - 8, 0, GROUND_Y + 4);
    grassG.addColorStop(0, '#9ccc65');
    grassG.addColorStop(0.5, '#558b2f');
    grassG.addColorStop(1, '#2e7d32');
    b.fillStyle = grassG;
    b.fillRect(0, GROUND_Y - 6, WORLD_W, 10);
    // Grass blades
    b.strokeStyle = '#1b5e20'; b.lineWidth = 1;
    for (let i = 0; i < WORLD_W; i += 5) {
      const h = 3 + ((i * 11) % 5);
      const lean = ((i * 7) % 3) - 1;
      b.beginPath();
      b.moveTo(i, GROUND_Y - 4);
      b.lineTo(i + lean, GROUND_Y - 4 - h);
      b.stroke();
    }
    // Lighter grass tips
    b.strokeStyle = '#aed581'; b.lineWidth = 0.8;
    for (let i = 2; i < WORLD_W; i += 5) {
      b.beginPath();
      b.moveTo(i, GROUND_Y - 5);
      b.lineTo(i, GROUND_Y - 7);
      b.stroke();
    }
    // Mushrooms & flowers along ground
    for (let i = 30; i < WORLD_W; i += 55) {
      const fx = i + ((i * 13) % 18) - 9;
      const choice = (i * 7) % 100;
      if (choice < 30) {
        // Red mushroom
        b.fillStyle = '#fdf5e6';
        b.fillRect(fx - 2, GROUND_Y - 4, 4, 6);
        b.fillStyle = '#c62828';
        b.beginPath(); b.arc(fx, GROUND_Y - 5, 5, Math.PI, 0); b.fill();
        b.fillStyle = '#fff';
        b.beginPath(); b.arc(fx - 1.8, GROUND_Y - 6, 0.8, 0, Math.PI*2); b.fill();
        b.beginPath(); b.arc(fx + 1.5, GROUND_Y - 5, 0.7, 0, Math.PI*2); b.fill();
      } else if (choice < 70) {
        // Flower
        const petalC = ['#e91e63','#ffeb3b','#9c27b0','#ff5722','#2196f3'][choice % 5];
        b.fillStyle = '#33691e';
        b.fillRect(fx - 0.5, GROUND_Y - 8, 1, 5);
        b.fillStyle = petalC;
        for (let a = 0; a < Math.PI * 2; a += Math.PI / 2) {
          b.beginPath();
          b.arc(fx + Math.cos(a) * 1.6, GROUND_Y - 9 + Math.sin(a) * 1.6, 1.5, 0, Math.PI*2);
          b.fill();
        }
        b.fillStyle = '#fff59d';
        b.beginPath(); b.arc(fx, GROUND_Y - 9, 1.1, 0, Math.PI*2); b.fill();
      } else {
        // Tall grass tuft
        b.strokeStyle = '#33691e'; b.lineWidth = 1.5;
        for (let g = -2; g <= 2; g++) {
          b.beginPath();
          b.moveTo(fx + g, GROUND_Y - 4);
          b.lineTo(fx + g * 0.5, GROUND_Y - 10);
          b.stroke();
        }
      }
    }
    // Fireflies near ground (warm dots)
    b.fillStyle = 'rgba(255, 235, 100, 0.7)';
    for (let i = 0; i < 30; i++) {
      const fx = (i * 73 + 20) % WORLD_W;
      const fy = GROUND_Y - 30 - ((i * 19) % 90);
      b.beginPath(); b.arc(fx, fy, 1.2, 0, Math.PI*2); b.fill();
    }

    // ===== Lumber camp at the bottom-right =====
    const camp = { x: 825, y: GROUND_Y };
    // Old chopped stumps (camp's victims)
    for (let i = 0; i < 2; i++) {
      const sx = camp.x + i * 20;
      const sy = camp.y - 8;
      b.fillStyle = '#3e2410';
      b.fillRect(sx - 6, sy, 12, 8);
      b.fillStyle = '#a17350';
      b.fillRect(sx - 6, sy, 12, 2);
      b.strokeStyle = '#6d4423'; b.lineWidth = 0.6;
      b.beginPath(); b.ellipse(sx, sy + 1, 4, 0.8, 0, 0, Math.PI*2); b.stroke();
      b.beginPath(); b.ellipse(sx, sy + 1, 2.5, 0.6, 0, 0, Math.PI*2); b.stroke();
    }

    // Wood pile (stacked logs)
    const pileX = camp.x - 30, pileY = camp.y - 6;
    const logColors = ['#8d6e63', '#795548', '#a1887f'];
    // Bottom row
    for (let i = 0; i < 3; i++) {
      const lx = pileX + i * 11;
      b.fillStyle = logColors[i % 3];
      b.beginPath(); b.ellipse(lx, pileY, 6, 4, 0, 0, Math.PI*2); b.fill();
      b.strokeStyle = '#3e2723'; b.lineWidth = 0.6; b.stroke();
      // End grain
      b.fillStyle = '#d7ccc8';
      b.beginPath(); b.arc(lx - 5, pileY - 1, 1.6, 0, Math.PI*2); b.fill();
      b.strokeStyle = '#6d4423'; b.lineWidth = 0.4;
      b.beginPath(); b.arc(lx - 5, pileY - 1, 1, 0, Math.PI*2); b.stroke();
    }
    // Top row (2 logs nested between bottom three)
    for (let i = 0; i < 2; i++) {
      const lx = pileX + 5.5 + i * 11;
      b.fillStyle = logColors[(i + 1) % 3];
      b.beginPath(); b.ellipse(lx, pileY - 7, 6, 4, 0, 0, Math.PI*2); b.fill();
      b.strokeStyle = '#3e2723'; b.lineWidth = 0.6; b.stroke();
      b.fillStyle = '#d7ccc8';
      b.beginPath(); b.arc(lx - 5, pileY - 8, 1.6, 0, Math.PI*2); b.fill();
    }

    // Sawhorse (X-frame with a log being cut)
    const sawX = camp.x - 70, sawY = camp.y;
    b.strokeStyle = '#5d4037'; b.lineWidth = 2.5;
    b.beginPath();
    b.moveTo(sawX - 10, sawY); b.lineTo(sawX - 4, sawY - 16);
    b.moveTo(sawX,    sawY); b.lineTo(sawX - 4, sawY - 16);
    b.stroke();
    b.beginPath();
    b.moveTo(sawX + 8, sawY); b.lineTo(sawX + 14, sawY - 16);
    b.moveTo(sawX + 18, sawY); b.lineTo(sawX + 14, sawY - 16);
    b.stroke();
    // Cross-beam
    b.lineWidth = 2.2;
    b.beginPath();
    b.moveTo(sawX - 5, sawY - 14); b.lineTo(sawX + 15, sawY - 14);
    b.stroke();
    // Log on top (partly sawn through)
    b.fillStyle = '#8d6e63';
    b.beginPath(); b.ellipse(sawX + 5, sawY - 17, 14, 4, 0, 0, Math.PI*2); b.fill();
    b.strokeStyle = '#3e2723'; b.lineWidth = 0.6; b.stroke();
    // Saw cut
    b.strokeStyle = '#1a0f0f'; b.lineWidth = 1;
    b.beginPath(); b.moveTo(sawX + 5, sawY - 21); b.lineTo(sawX + 5, sawY - 13); b.stroke();
    // Hand saw leaning beside
    b.strokeStyle = '#6d4c2a'; b.lineWidth = 2;
    b.beginPath(); b.moveTo(sawX - 16, sawY - 1); b.lineTo(sawX - 22, sawY - 12); b.stroke();
    b.fillStyle = '#cfd8dc';
    b.beginPath();
    b.moveTo(sawX - 22, sawY - 12); b.lineTo(sawX - 18, sawY - 16); b.lineTo(sawX - 13, sawY - 5);
    b.closePath(); b.fill();
    b.strokeStyle = '#37474f'; b.lineWidth = 0.5; b.stroke();
    // Saw teeth
    b.strokeStyle = '#37474f'; b.lineWidth = 0.6;
    for (let i = 0; i < 5; i++) {
      b.beginPath();
      b.moveTo(sawX - 22 + i*2, sawY - 12 + i*1.4);
      b.lineTo(sawX - 21 + i*2, sawY - 10 + i*1.4);
      b.stroke();
    }

    // Campfire ring + logs
    const fireX = camp.x - 110, fireY = camp.y - 2;
    b.fillStyle = '#3e2723';
    for (let a = 0; a < Math.PI * 2; a += Math.PI / 5) {
      b.beginPath();
      b.arc(fireX + Math.cos(a) * 9, fireY + Math.sin(a) * 3, 1.6, 0, Math.PI*2);
      b.fill();
    }
    // Fire logs (criss-cross)
    b.strokeStyle = '#5d3a1c'; b.lineWidth = 3;
    b.beginPath(); b.moveTo(fireX - 7, fireY - 3); b.lineTo(fireX + 7, fireY + 3); b.stroke();
    b.beginPath(); b.moveTo(fireX - 7, fireY + 3); b.lineTo(fireX + 7, fireY - 3); b.stroke();
    // Fire base glow
    const fg = b.createRadialGradient(fireX, fireY - 4, 1, fireX, fireY - 4, 10);
    fg.addColorStop(0, '#ffeb3b');
    fg.addColorStop(0.4, '#ff6f00');
    fg.addColorStop(1, 'rgba(183, 28, 28, 0)');
    b.fillStyle = fg;
    b.beginPath(); b.arc(fireX, fireY - 5, 10, 0, Math.PI*2); b.fill();
    // Inner flames
    b.fillStyle = '#ff9800';
    b.beginPath();
    b.moveTo(fireX - 4, fireY - 1);
    b.quadraticCurveTo(fireX - 2, fireY - 10, fireX, fireY - 4);
    b.quadraticCurveTo(fireX + 2, fireY - 12, fireX + 4, fireY - 1);
    b.closePath(); b.fill();
    b.fillStyle = '#ffeb3b';
    b.beginPath();
